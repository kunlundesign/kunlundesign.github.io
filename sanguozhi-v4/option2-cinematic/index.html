<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烽火征途 · 三国史诗</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --wei-color: #4a6b8a;
      --shu-color: #8a4a4a;
      --wu-color: #5a8a5a;
      --gold: #c9a55c;
      --bg-dark: #0a0908;
      --text-light: #e8e4df;
      --text-muted: #706050;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 全屏电影开场 */
    .cinematic-intro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
    }

    .cinematic-intro::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(138, 74, 74, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(74, 107, 138, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(90, 138, 90, 0.1) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }

    .cinematic-intro.hidden {
      opacity: 0;
      transition: opacity 1.5s;
      pointer-events: none;
    }

    .epic-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 6rem;
      color: transparent;
      background: linear-gradient(180deg, #f0e6d3 0%, var(--gold) 50%, #8a6a3a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 80px rgba(201, 165, 92, 0.4);
      margin-bottom: 1rem;
      letter-spacing: 0.3em;
      position: relative;
      z-index: 1;
      animation: titleReveal 2s ease-out;
    }

    @keyframes titleReveal {
      from { 
        opacity: 0;
        transform: scale(1.2);
        filter: blur(10px);
      }
      to { 
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    .epic-subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      letter-spacing: 0.5em;
      margin-bottom: 5rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 2s ease-out 0.5s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 势力选择 - 电影海报风格 */
    .faction-posters {
      display: flex;
      gap: 3rem;
      perspective: 2000px;
      position: relative;
      z-index: 1;
    }

    .faction-poster {
      width: 280px;
      height: 400px;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      animation: posterReveal 1s ease-out both;
    }

    .faction-poster:nth-child(1) { animation-delay: 0.8s; }
    .faction-poster:nth-child(2) { animation-delay: 1s; }
    .faction-poster:nth-child(3) { animation-delay: 1.2s; }

    @keyframes posterReveal {
      from {
        opacity: 0;
        transform: translateY(100px) rotateX(30deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotateX(0);
      }
    }

    .faction-poster:hover {
      transform: translateY(-30px) scale(1.05);
      z-index: 10;
    }

    .poster-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, 
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.3) 40%,
        rgba(0,0,0,0.9) 100%
      );
      border: 1px solid rgba(201, 165, 92, 0.2);
      overflow: hidden;
    }

    .faction-poster.wei .poster-frame {
      background: 
        linear-gradient(180deg, rgba(74, 107, 138, 0.3) 0%, transparent 50%),
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
    }

    .faction-poster.shu .poster-frame {
      background: 
        linear-gradient(180deg, rgba(138, 74, 74, 0.3) 0%, transparent 50%),
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
    }

    .faction-poster.wu .poster-frame {
      background: 
        linear-gradient(180deg, rgba(90, 138, 90, 0.3) 0%, transparent 50%),
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
    }

    .faction-poster:hover .poster-frame {
      border-color: var(--gold);
      box-shadow: 
        0 30px 80px rgba(0,0,0,0.8),
        0 0 40px rgba(201, 165, 92, 0.2);
    }

    .poster-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }

    .poster-symbol {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 5rem;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201, 165, 92, 0.5);
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }

    .poster-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: 0.2em;
    }

    .poster-leader {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .poster-tagline {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(201, 165, 92, 0.3);
      display: inline-block;
    }

    /* 战役选择界面 */
    .campaign-screen {
      min-height: 100vh;
      padding: 100px 5%;
      display: none;
    }

    .campaign-screen.active {
      display: block;
    }

    .campaign-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .campaign-faction {
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
    }

    .campaign-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .campaign-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* 战役卡片 - 电影海报风格 */
    .battle-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .battle-card {
      position: relative;
      aspect-ratio: 2/3;
      cursor: pointer;
      overflow: hidden;
      border: 1px solid rgba(201, 165, 92, 0.1);
      transition: all 0.5s;
    }

    .battle-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,0.3) 50%,
        rgba(0,0,0,0.95) 100%
      );
      z-index: 1;
    }

    .battle-card:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(201, 165, 92, 0.1);
    }

    .battle-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a2420 0%, #1a1612 100%);
      transition: transform 0.5s;
    }

    .battle-card:hover .battle-bg {
      transform: scale(1.1);
    }

    .battle-info {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 2rem;
      z-index: 2;
    }

    .battle-number {
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
    }

    .battle-name {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .battle-year {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .battle-desc {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .battle-rewards {
      display: flex;
      gap: 0.5rem;
    }

    .reward-badge {
      padding: 0.3rem 0.8rem;
      background: rgba(201, 165, 92, 0.1);
      border: 1px solid rgba(201, 165, 92, 0.3);
      font-size: 0.75rem;
      color: var(--gold);
    }

    .battle-card.locked {
      opacity: 0.5;
      pointer-events: none;
    }

    .battle-card.locked::after {
      content: '🔒';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      z-index: 3;
    }

    /* 进度条 */
    .progress-section {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(0deg, rgba(10, 9, 8, 0.95) 0%, transparent 100%);
      padding: 2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-info {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .progress-bar-container {
      width: 300px;
    }

    .progress-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      height: 4px;
      background: rgba(201, 165, 92, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--gold);
      width: 20%;
      transition: width 0.5s;
    }

    .hero-collection {
      display: flex;
      gap: -10px;
    }

    .hero-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: #2a2420;
      margin-left: -10px;
    }

    .hero-avatar:first-child {
      margin-left: 0;
    }

    .version-tag {
      position: fixed;
      top: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      z-index: 50;
    }

    /* 音乐控制 */
    .music-control {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(201, 165, 92, 0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s;
      z-index: 50;
    }

    .music-control:hover {
      border-color: var(--gold);
      background: rgba(201, 165, 92, 0.1);
    }
  </style>
</head>
<body>
  <button class="music-control" id="musicBtn">🔇</button>

  <!-- 电影开场 -->
  <div class="cinematic-intro" id="introScreen">
    <h1 class="epic-title">烽火征途</h1>
    <p class="epic-subtitle">三国 · 史诗战役</p>
    
    <div class="faction-posters">
      <div class="faction-poster wei" onclick="selectFaction('wei')">
        <div class="poster-frame"></div>
        <div class="poster-content">
          <div class="poster-symbol">魏</div>
          <div class="poster-title">曹魏</div>
          <div class="poster-leader">曹操 · 曹丕 · 司马懿</div>
          <div class="poster-tagline">挟天子以令诸侯</div>
        </div>
      </div>
      
      <div class="faction-poster shu" onclick="selectFaction('shu')">
        <div class="poster-frame"></div>
        <div class="poster-content">
          <div class="poster-symbol">蜀</div>
          <div class="poster-title">蜀汉</div>
          <div class="poster-leader">刘备 · 诸葛亮 · 五虎将</div>
          <div class="poster-tagline">兴复汉室</div>
        </div>
      </div>
      
      <div class="faction-poster wu" onclick="selectFaction('wu')">
        <div class="poster-frame"></div>
        <div class="poster-content">
          <div class="poster-symbol">吴</div>
          <div class="poster-title">东吴</div>
          <div class="poster-leader">孙权 · 周瑜 · 陆逊</div>
          <div class="poster-tagline">据江东以观天下</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 战役选择 -->
  <div class="campaign-screen" id="campaignScreen">
    <div class="campaign-header">
      <div class="campaign-faction" id="campaignFaction">蜀汉</div>
      <h1 class="campaign-title">选择战役</h1>
      <p class="campaign-subtitle">完成战役解锁武将，征服天下</p>
    </div>

    <div class="battle-cards" id="battleCards">
      <div class="battle-card" onclick="startBattle('taoyuan')">
        <div class="battle-bg"></div>
        <div class="battle-info">
          <div class="battle-number">第一章</div>
          <div class="battle-name">桃园结义</div>
          <div class="battle-year">中平元年 · 184年</div>
          <div class="battle-desc">三人同心，其利断金</div>
          <div class="battle-rewards">
            <span class="reward-badge">刘备</span>
            <span class="reward-badge">关羽</span>
            <span class="reward-badge">张飞</span>
          </div>
        </div>
      </div>

      <div class="battle-card locked">
        <div class="battle-bg"></div>
        <div class="battle-info">
          <div class="battle-number">第二章</div>
          <div class="battle-name">长坂坡</div>
          <div class="battle-year">建安十三年 · 208年</div>
          <div class="battle-desc">七进七出，单骑救主</div>
          <div class="battle-rewards">
            <span class="reward-badge">赵云</span>
          </div>
        </div>
      </div>

      <div class="battle-card locked">
        <div class="battle-bg"></div>
        <div class="battle-info">
          <div class="battle-number">第三章</div>
          <div class="battle-name">赤壁之战</div>
          <div class="battle-year">建安十三年 · 208年</div>
          <div class="battle-desc">借东风，火烧连环船</div>
          <div class="battle-rewards">
            <span class="reward-badge">诸葛亮</span>
          </div>
        </div>
      </div>

      <div class="battle-card locked">
        <div class="battle-bg"></div>
        <div class="battle-info">
          <div class="battle-number">第四章</div>
          <div class="battle-name">定军山</div>
          <div class="battle-year">建安二十四年 · 219年</div>
          <div class="battle-desc">老将不老，刀斩夏侯</div>
          <div class="battle-rewards">
            <span class="reward-badge">黄忠</span>
          </div>
        </div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-info">
        <div class="progress-bar-container">
          <div class="progress-label">战役进度 1/5</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: 20%;"></div>
          </div>
        </div>
      </div>
      <div class="hero-collection">
        <div class="hero-avatar"></div>
        <div class="hero-avatar"></div>
        <div class="hero-avatar"></div>
      </div>
    </div>
  </div>

  <div class="version-tag">V4 方案二 · 烽火征途</div>

  <script>
    function selectFaction(faction) {
      const names = { wei: '曹魏', shu: '蜀汉', wu: '东吴' };
      document.getElementById('campaignFaction').textContent = names[faction];
      
      document.getElementById('introScreen').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('campaignScreen').classList.add('active');
      }, 800);
    }

    function startBattle(battleId) {
      alert('进入战役：' + battleId);
    }

    // 音乐控制
    let musicPlaying = false;
    document.getElementById('musicBtn').onclick = function() {
      musicPlaying = !musicPlaying;
      this.textContent = musicPlaying ? '🔊' : '🔇';
    };
  </script>
</body>
</html>
