<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三国志·舆图 | 方案C 水墨山河</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --wei: #5a8ab8;
      --shu: #c86464;
      --wu: #64a864;
      --ink: #1a1a1a;
      --ink-light: #3a3a3a;
      --paper: #f5f0e6;
      --gold: #b8965a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      overflow: hidden;
    }

    /* 开场 - 水墨渲染 */
    .ink-intro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--paper);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
    }

    .ink-intro.hidden {
      opacity: 0;
      transition: opacity 1.2s;
      pointer-events: none;
    }

    /* 水墨背景动画 */
    .ink-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ink-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: inkSpread 8s ease-in-out infinite alternate;
    }

    .ink-blob:nth-child(1) {
      width: 60%;
      height: 60%;
      background: var(--ink);
      top: -20%;
      left: -10%;
      animation-delay: 0s;
    }

    .ink-blob:nth-child(2) {
      width: 50%;
      height: 50%;
      background: var(--ink-light);
      bottom: -15%;
      right: -10%;
      animation-delay: 2s;
    }

    .ink-blob:nth-child(3) {
      width: 40%;
      height: 40%;
      background: var(--ink);
      top: 30%;
      right: 20%;
      animation-delay: 4s;
    }

    @keyframes inkSpread {
      from { transform: scale(1) rotate(0deg); }
      to { transform: scale(1.2) rotate(10deg); }
    }

    .intro-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .intro-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 6rem;
      color: var(--ink);
      margin-bottom: 1rem;
      opacity: 0;
      animation: brushStroke 1.5s ease-out 0.5s forwards;
    }

    @keyframes brushStroke {
      from {
        opacity: 0;
        transform: translateY(30px);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .intro-subtitle {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.2rem;
      color: var(--ink-light);
      letter-spacing: 0.8em;
      margin-bottom: 4rem;
      opacity: 0;
      animation: brushStroke 1.5s ease-out 1s forwards;
    }

    /* 势力选择 - 水墨圆章 */
    .faction-circles {
      display: flex;
      gap: 4rem;
      opacity: 0;
      animation: brushStroke 1.5s ease-out 1.5s forwards;
    }

    .faction-circle {
      width: 140px;
      height: 140px;
      position: relative;
      cursor: pointer;
      transition: all 0.5s;
    }

    .faction-circle:hover {
      transform: scale(1.1);
    }

    .circle-ink {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid var(--ink);
      opacity: 0.8;
      transition: all 0.5s;
    }

    .faction-circle:hover .circle-ink {
      border-width: 5px;
    }

    .faction-circle.wei:hover .circle-ink { border-color: var(--wei); }
    .faction-circle.shu:hover .circle-ink { border-color: var(--shu); }
    .faction-circle.wu:hover .circle-ink { border-color: var(--wu); }

    .circle-symbol {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 4rem;
      color: var(--ink);
      transition: color 0.5s;
    }

    .faction-circle.wei:hover .circle-symbol { color: var(--wei); }
    .faction-circle.shu:hover .circle-symbol { color: var(--shu); }
    .faction-circle.wu:hover .circle-symbol { color: var(--wu); }

    .circle-label {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      color: var(--ink-light);
      white-space: nowrap;
    }

    /* 地图主界面 */
    .map-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--paper);
      display: none;
      overflow: hidden;
    }

    .map-screen.active {
      display: block;
    }

    /* 水墨地图 */
    .ink-map {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 动态云雾 */
    .mist-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.8) 0%, transparent 40%),
        radial-gradient(ellipse at 70% 60%, rgba(255,255,255,0.6) 0%, transparent 35%),
        radial-gradient(ellipse at 40% 80%, rgba(255,255,255,0.7) 0%, transparent 30%);
      animation: mistDrift 30s linear infinite;
      pointer-events: none;
    }

    @keyframes mistDrift {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* 山水背景 */
    .landscape {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      opacity: 0.2;
      pointer-events: none;
    }

    .mountain-range {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    .mountain {
      position: absolute;
      bottom: 0;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }

    .mountain:nth-child(1) {
      left: 5%;
      width: 25%;
      height: 80%;
      background: linear-gradient(180deg, var(--ink-light) 0%, var(--ink) 100%);
    }

    .mountain:nth-child(2) {
      left: 20%;
      width: 30%;
      height: 90%;
      background: linear-gradient(180deg, var(--ink-light) 0%, var(--ink) 100%);
    }

    .mountain:nth-child(3) {
      left: 45%;
      width: 20%;
      height: 70%;
      background: linear-gradient(180deg, #555 0%, var(--ink) 100%);
    }

    .mountain:nth-child(4) {
      right: 10%;
      width: 35%;
      height: 85%;
      background: linear-gradient(180deg, var(--ink-light) 0%, var(--ink) 100%);
    }

    /* 势力渲染 */
    .faction-wash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s;
      pointer-events: none;
    }

    .faction-wash.active {
      opacity: 1;
    }

    .faction-wash.wei {
      background: radial-gradient(ellipse at 60% 30%, rgba(90, 138, 184, 0.2) 0%, transparent 50%);
    }

    .faction-wash.shu {
      background: radial-gradient(ellipse at 30% 60%, rgba(200, 100, 100, 0.2) 0%, transparent 50%);
    }

    .faction-wash.wu {
      background: radial-gradient(ellipse at 70% 70%, rgba(100, 168, 100, 0.2) 0%, transparent 50%);
    }

    /* 顶部导航 */
    .map-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(245, 240, 230, 0.95) 0%, transparent 100%);
      z-index: 50;
    }

    .current-faction-info {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .faction-brush-mark {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem;
      color: var(--ink);
      transition: all 0.4s;
    }

    .faction-brush-mark.wei { border-color: var(--wei); color: var(--wei); }
    .faction-brush-mark.shu { border-color: var(--shu); color: var(--shu); }
    .faction-brush-mark.wu { border-color: var(--wu); color: var(--wu); }

    .faction-text h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      margin-bottom: 0.2rem;
    }

    .faction-text p {
      font-size: 0.85rem;
      color: var(--ink-light);
      letter-spacing: 0.2em;
    }

    .faction-switch-row {
      display: flex;
      gap: 1rem;
    }

    .switch-circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid var(--ink-light);
      background: transparent;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.3rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0.5;
    }

    .switch-circle:hover,
    .switch-circle.active {
      opacity: 1;
    }

    .switch-circle.wei:hover,
    .switch-circle.wei.active { border-color: var(--wei); color: var(--wei); }
    .switch-circle.shu:hover,
    .switch-circle.shu.active { border-color: var(--shu); color: var(--shu); }
    .switch-circle.wu:hover,
    .switch-circle.wu.active { border-color: var(--wu); color: var(--wu); }

    /* 战役城池标记 */
    .city-marker {
      position: absolute;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 20;
    }

    .city-marker:hover {
      transform: scale(1.3);
      z-index: 30;
    }

    .city-icon {
      width: 50px;
      height: 50px;
      position: relative;
    }

    .city-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      animation: cityPulse 2s ease-in-out infinite;
    }

    .city-marker.wei .city-glow { background: radial-gradient(circle, var(--wei) 0%, transparent 70%); }
    .city-marker.shu .city-glow { background: radial-gradient(circle, var(--shu) 0%, transparent 70%); }
    .city-marker.wu .city-glow { background: radial-gradient(circle, var(--wu) 0%, transparent 70%); }

    @keyframes cityPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.9; }
    }

    .city-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: var(--ink);
      border-radius: 50%;
      border: 2px solid var(--paper);
    }

    .city-label {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 5px;
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 0.9rem;
      color: var(--ink);
      white-space: nowrap;
    }

    /* 战役弹窗 */
    .battle-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(245, 240, 230, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .battle-modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-panel {
      background: var(--paper);
      border: 2px solid var(--ink);
      padding: 3rem 4rem;
      max-width: 500px;
      position: relative;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
    }

    .modal-panel::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: -10px;
      bottom: -10px;
      border: 1px solid var(--ink-light);
      z-index: -1;
    }

    .modal-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .modal-year {
      text-align: center;
      font-size: 0.9rem;
      color: var(--ink-light);
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
    }

    .modal-divider {
      width: 60px;
      height: 2px;
      background: var(--ink);
      margin: 0 auto 2rem;
    }

    .modal-desc {
      font-size: 1.05rem;
      line-height: 2.2;
      text-align: justify;
      margin-bottom: 2.5rem;
    }

    .modal-btns {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .modal-btn {
      padding: 0.8rem 2.5rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid var(--ink);
    }

    .modal-btn.primary {
      background: var(--ink);
      color: var(--paper);
    }

    .modal-btn.primary:hover {
      background: var(--ink-light);
    }

    .modal-btn.secondary {
      background: var(--paper);
      color: var(--ink);
    }

    .modal-btn.secondary:hover {
      background: rgba(0,0,0,0.05);
    }

    /* 底部诗句 */
    .poem-footer {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 0.9rem;
      color: var(--ink-light);
      letter-spacing: 0.3em;
    }
  </style>
</head>
<body>
  <!-- 开场水墨 -->
  <div class="ink-intro" id="inkIntro">
    <div class="ink-bg">
      <div class="ink-blob"></div>
      <div class="ink-blob"></div>
      <div class="ink-blob"></div>
    </div>
    
    <div class="intro-content">
      <h1 class="intro-title">山河舆图</h1>
      <p class="intro-subtitle">水墨江山 · 三分天下</p>
      
      <div class="faction-circles">
        <div class="faction-circle wei" onclick="selectFaction('wei')">
          <div class="circle-ink"></div>
          <div class="circle-symbol">魏</div>
          <div class="circle-label">曹魏</div>
        </div>
        
        <div class="faction-circle shu" onclick="selectFaction('shu')">
          <div class="circle-ink"></div>
          <div class="circle-symbol">蜀</div>
          <div class="circle-label">蜀汉</div>
        </div>
        
        <div class="faction-circle wu" onclick="selectFaction('wu')">
          <div class="circle-ink"></div>
          <div class="circle-symbol">吴</div>
          <div class="circle-label">东吴</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 地图主界面 -->
  <div class="map-screen" id="mapScreen">
    <div class="ink-map">
      <!-- 山水背景 -->
      <div class="landscape">
        <div class="mountain-range">
          <div class="mountain"></div>
          <div class="mountain"></div>
          <div class="mountain"></div>
          <div class="mountain"></div>
        </div>
      </div>

      <!-- 云雾 -->
      <div class="mist-layer"></div>

      <!-- 势力渲染 -->
      <div class="faction-wash wei"></div>
      <div class="faction-wash shu active"></div>
      <div class="faction-wash wu"></div>

      <!-- 蜀汉战役 -->
      <div class="city-marker shu shu-battle" style="left: 22%; top: 55%;" onclick="openBattle('taoyuan')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">桃园</div>
      </div>

      <div class="city-marker shu shu-battle" style="left: 42%; top: 48%;" onclick="openBattle('changban')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">长坂坡</div>
      </div>

      <div class="city-marker shu shu-battle" style="left: 28%; top: 35%;" onclick="openBattle('dingjun')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">定军山</div>
      </div>

      <div class="city-marker shu shu-battle" style="left: 50%; top: 52%;" onclick="openBattle('chibi')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">赤壁</div>
      </div>

      <!-- 曹魏战役 -->
      <div class="city-marker wei wei-battle" style="left: 52%; top: 25%;" onclick="openBattle('guandu')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">官渡</div>
      </div>

      <div class="city-marker wei wei-battle" style="left: 62%; top: 40%;" onclick="openBattle('hefei')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">合肥</div>
      </div>

      <!-- 东吴战役 -->
      <div class="city-marker wu wu-battle" style="left: 68%; top: 55%;" onclick="openBattle('shiting')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">石亭</div>
      </div>

      <div class="city-marker wu wu-battle" style="left: 48%; top: 62%;" onclick="openBattle('yiling')">
        <div class="city-icon">
          <div class="city-glow"></div>
          <div class="city-dot"></div>
        </div>
        <div class="city-label">夷陵</div>
      </div>
    </div>

    <div class="map-header">
      <div class="current-faction-info">
        <div class="faction-brush-mark shu" id="factionMark">蜀</div>
        <div class="faction-text">
          <h1 id="factionName">蜀汉</h1>
          <p id="factionMotto">兴复汉室 · 还于旧都</p>
        </div>
      </div>
      <div class="faction-switch-row">
        <button class="switch-circle wei" onclick="switchFaction('wei')">魏</button>
        <button class="switch-circle shu active" onclick="switchFaction('shu')">蜀</button>
        <button class="switch-circle wu" onclick="switchFaction('wu')">吴</button>
      </div>
    </div>

    <div class="poem-footer">
      滚滚长江东逝水，浪花淘尽英雄
    </div>
  </div>

  <!-- 战役弹窗 -->
  <div class="battle-modal" id="battleModal">
    <div class="modal-panel">
      <h2 class="modal-title" id="modalTitle">桃园结义</h2>
      <p class="modal-year" id="modalYear">中平元年</p>
      <div class="modal-divider"></div>
      <p class="modal-desc" id="modalDesc">描述</p>
      <div class="modal-btns">
        <button class="modal-btn secondary" onclick="closeModal()">返回</button>
        <button class="modal-btn primary" onclick="startBattle()">开始战役</button>
      </div>
    </div>
  </div>

  <script>
    const factions = {
      wei: { name: '曹魏', symbol: '魏', motto: '挟天子以令诸侯' },
      shu: { name: '蜀汉', symbol: '蜀', motto: '兴复汉室 · 还于旧都' },
      wu: { name: '东吴', symbol: '吴', motto: '据江东以观天下' }
    };

    const battles = {
      taoyuan: { title: '桃园结义', year: '中平元年', desc: '刘备、关羽、张飞于桃园之中结为异姓兄弟，誓同生死，共图大业。此后三人同心协力，终成蜀汉基业。' },
      changban: { title: '长坂坡', year: '建安十三年', desc: '赵云于百万军中七进七出，单骑救出幼主阿斗；张飞据水断桥，一声怒吼，喝退曹军。' },
      dingjun: { title: '定军山', year: '建安二十四年', desc: '老将黄忠居高临下，一刀斩杀曹魏大将夏侯渊。此战奠定刘备汉中王之位。' },
      chibi: { title: '赤壁之战', year: '建安十三年', desc: '孙刘联军以火攻大破曹军八十万，奠定三分天下之势。周瑜、诸葛亮联手，以少胜多，成就千古传奇。' },
      guandu: { title: '官渡之战', year: '建安五年', desc: '曹操以少胜多，火烧乌巢，大败袁绍。此战奠定曹操统一北方的基础。' },
      hefei: { title: '合肥之战', year: '建安二十年', desc: '张辽威震逍遥津，以八百精兵突袭孙权十万大军。此战后，江东小儿闻张辽之名不敢夜啼。' },
      yiling: { title: '夷陵之战', year: '章武二年', desc: '陆逊火烧连营七百里，刘备兵败白帝城。此战使蜀汉元气大伤。' },
      shiting: { title: '石亭之战', year: '太和二年', desc: '陆逊诈降诱敌，大败曹休。此战巩固了东吴的江淮防线。' }
    };

    let currentFaction = 'shu';

    function selectFaction(faction) {
      currentFaction = faction;
      document.getElementById('inkIntro').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('mapScreen').classList.add('active');
        updateFaction(faction);
      }, 600);
    }

    function switchFaction(faction) {
      currentFaction = faction;
      updateFaction(faction);
      
      document.querySelectorAll('.switch-circle').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.switch-circle.${faction}`).classList.add('active');
    }

    function updateFaction(faction) {
      const data = factions[faction];
      const mark = document.getElementById('factionMark');
      mark.textContent = data.symbol;
      mark.className = `faction-brush-mark ${faction}`;
      document.getElementById('factionName').textContent = data.name;
      document.getElementById('factionMotto').textContent = data.motto;

      // 更新水墨渲染
      document.querySelectorAll('.faction-wash').forEach(w => w.classList.remove('active'));
      document.querySelector(`.faction-wash.${faction}`).classList.add('active');

      // 显示对应战役
      document.querySelectorAll('.city-marker').forEach(marker => {
        if (marker.classList.contains(`${faction}-battle`)) {
          marker.style.display = 'block';
        } else {
          marker.style.display = 'none';
        }
      });
    }

    function openBattle(battleId) {
      const battle = battles[battleId];
      document.getElementById('modalTitle').textContent = battle.title;
      document.getElementById('modalYear').textContent = battle.year;
      document.getElementById('modalDesc').textContent = battle.desc;
      document.getElementById('battleModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('battleModal').classList.remove('active');
    }

    function startBattle() {
      alert('进入战役！');
      closeModal();
    }
  </script>
</body>
</html>
