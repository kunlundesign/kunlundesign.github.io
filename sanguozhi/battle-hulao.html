<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虎牢关之战 · 交互战场</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1612;
      --bg-secondary: #241f1a;
      --bg-card: #2a2420;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --border: rgba(201, 165, 92, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .scene-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .scene-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1612 0%, #2a1a1a 50%, #1a1612 100%);
      z-index: -2;
    }

    .scene-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('images/hulao.jpg') center/cover;
      opacity: 0.3;
      filter: sepia(30%) brightness(0.6);
    }

    .dust-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(0deg, rgba(180, 150, 100, 0.2) 0%, transparent 100%);
      z-index: -1;
      opacity: 0;
      transition: opacity 1s;
    }

    .dust-overlay.active {
      opacity: 1;
      animation: dustWave 2s ease-in-out infinite alternate;
    }

    @keyframes dustWave {
      from { opacity: 0.4; }
      to { opacity: 0.7; }
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: linear-gradient(180deg, rgba(26, 22, 18, 0.95) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .back-btn:hover { color: var(--text-primary); }

    .scene-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      color: var(--accent-gold);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    .scene-year {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .narrative-panel {
      background: rgba(26, 22, 18, 0.95);
      border: 1px solid var(--border);
      padding: 2.5rem;
      margin-bottom: 2rem;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .narrative-text {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-primary);
      text-align: justify;
      margin-bottom: 1.5rem;
    }

    .narrative-text .highlight {
      color: var(--accent-gold);
      font-weight: 500;
    }

    .speaker {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .speaker-avatar {
      width: 60px;
      height: 60px;
      border: 2px solid var(--accent-gold);
      object-fit: cover;
      object-position: top;
    }

    .speaker-name {
      font-size: 1.1rem;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .speaker-title {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }

    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
      transform: translateX(8px);
    }

    .choice-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--accent-gold);
      font-weight: 600;
      flex-shrink: 0;
    }

    .choice-text { flex: 1; }

    .choice-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    .quiz-panel {
      display: none;
      width: 100%;
    }

    .quiz-panel.active { display: block; }

    .quiz-question {
      font-size: 1.15rem;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .quiz-option {
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .quiz-option:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
    }

    .quiz-option.correct {
      border-color: var(--accent-green);
      background: rgba(90, 138, 90, 0.2);
    }

    .quiz-option.wrong {
      border-color: var(--accent-red);
      background: rgba(179, 60, 60, 0.2);
    }

    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .ending-panel {
      display: none;
      width: 100%;
      text-align: center;
    }

    .ending-panel.active { display: block; }

    .ending-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .ending-title.victory {
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(201, 165, 92, 0.5);
    }

    .ending-title.defeat {
      color: var(--accent-red);
      text-shadow: 0 0 20px rgba(179, 60, 60, 0.5);
    }

    .ending-desc {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .history-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2rem;
      margin: 2rem 0;
      text-align: left;
    }

    .history-card-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      color: var(--accent-gold);
      font-size: 0.9rem;
    }

    .history-card-title {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .history-card-text {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-secondary);
    }

    .action-btns {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .action-btn {
      padding: 1rem 2rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-btn.primary {
      background: var(--accent-gold);
      border: none;
      color: var(--bg-primary);
    }

    .action-btn.primary:hover { background: #d9b56c; }

    .action-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .action-btn.secondary:hover { border-color: var(--accent-gold); }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--bg-secondary);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gold);
      transition: width 0.5s ease;
    }

    .fade-in { animation: fadeIn 0.6s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in { animation: slideIn 0.4s ease forwards; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 768px) {
      .narrative-panel { padding: 1.5rem; }
      .scene-title { font-size: 1.4rem; }
      .ending-title { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="scene-bg"></div>
    <div class="dust-overlay" id="dustOverlay"></div>

    <div class="top-bar">
      <a href="index.html#battlefield" class="back-btn">← 返回沙场</a>
      <div style="text-align: center;">
        <div class="scene-title">虎牢关之战</div>
        <div class="scene-year">初平元年 · 公元190年</div>
      </div>
      <div style="width: 80px;"></div>
    </div>

    <div class="main-content">
      <!-- 开场叙事 -->
      <div class="narrative-panel fade-in" id="intro">
        <div class="narrative-text">
          <span class="highlight">初平元年</span>，关东诸侯会盟讨伐董卓。董卓令义子<span class="highlight">吕布</span>镇守虎牢关，阻挡联军。
        </div>
        <div class="narrative-text">
          吕布身骑<span class="highlight">赤兔马</span>，手持<span class="highlight">方天画戟</span>，于关前叫阵。诸侯军中无人能敌，连斩数将，威震天下。
        </div>
        <div class="narrative-text">
          河北名将<span class="highlight">公孙瓒</span>出战，不过数合，险被吕布刺于马下。千钧一发之际，一员黑脸大汉飞马杀出！
        </div>
        <div class="narrative-text" style="color: var(--accent-gold);">
          "三姓家奴休要猖狂！燕人张飞在此！"
        </div>
        <button class="action-btn primary" onclick="showChoices()" style="margin-top: 1rem;">
          进入战场
        </button>
      </div>

      <!-- 选择面板 -->
      <div class="narrative-panel" id="choicesPanel" style="display: none;">
        <div class="speaker">
          <img src="images/zhangfei.png" alt="张飞" class="speaker-avatar">
          <div class="speaker-info">
            <span class="speaker-name">张飞</span>
            <span class="speaker-title">燕人 · 猛将</span>
          </div>
        </div>
        <div class="narrative-text">
          张飞与吕布大战五十回合，不分胜负！关羽见状，拍马舞刀杀入战团。二人夹攻吕布，吕布渐感不支。
        </div>
        <div class="narrative-text">
          刘备在阵中观战，此刻当如何抉择？
        </div>
        <div class="choices" id="mainChoices">
          <button class="choice-btn slide-in" onclick="selectPath('join')" style="animation-delay: 0.1s">
            <span class="choice-icon">壹</span>
            <div class="choice-text">
              亲自上阵，三英战吕布
              <div class="choice-hint">仁德之君，不惧生死，与兄弟共进退</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('command')" style="animation-delay: 0.2s">
            <span class="choice-icon">贰</span>
            <div class="choice-text">
              指挥诸侯军趁机掩杀
              <div class="choice-hint">运筹帷幄，借势破敌</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('wait')" style="animation-delay: 0.3s">
            <span class="choice-icon">叁</span>
            <div class="choice-text">
              按兵不动，观察形势
              <div class="choice-hint">静观其变，保存实力</div>
            </div>
          </button>
        </div>
      </div>

      <!-- 问答面板 -->
      <div class="narrative-panel quiz-panel" id="quizPanel">
        <div class="speaker" id="quizSpeaker"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>

      <!-- 结局面板 -->
      <div class="narrative-panel ending-panel" id="endingPanel">
        <div class="ending-title" id="endingTitle"></div>
        <div class="ending-desc" id="endingDesc"></div>
        <div class="history-card">
          <div class="history-card-header">📜 历史真相</div>
          <div class="history-card-title" id="historyTitle"></div>
          <div class="history-card-text" id="historyText"></div>
        </div>
        <div class="action-btns">
          <button class="action-btn secondary" onclick="restart()">重新挑战</button>
          <button class="action-btn primary" onclick="location.href='index.html#battlefield'">返回沙场</button>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <script>
    const quizData = {
      join: {
        speaker: { name: '刘备', title: '汉室宗亲', avatar: 'images/liubei.png' },
        intro: '刘备挺双股剑，纵马杀入战团。三人围攻吕布，吕布渐感力怯。此时刘备当攻何处？',
        question: '"吕布武艺天下无双，三人合力方能相持。若要取胜，当如何配合？"',
        options: [
          { text: '佯攻其前，关张两翼包抄', correct: true },
          { text: '三人齐攻，以力取胜', correct: false },
          { text: '诱敌深入，伏兵四起', correct: false },
          { text: '单挑吕布，显我勇武', correct: false }
        ],
        correctResponse: '刘备剑指吕布面门，关张两翼齐出！吕布左支右绌，画戟险些脱手，大呼"且住"，拨马便走！',
        wrongResponse: '配合失当，吕布寻得破绽，一戟扫出，刘备险些落马！幸得关张拼死护卫，方才脱险。'
      },
      command: {
        speaker: { name: '刘备', title: '汉室宗亲', avatar: 'images/liubei.png' },
        intro: '刘备号令诸侯军趁势进攻。然而诸侯各怀心思，号令难行。',
        question: '"诸侯各自为战，如何能让他们听从调遣，合力破敌？"',
        options: [
          { text: '以汉室宗亲名义，晓以大义', correct: true },
          { text: '许以重利，分享战功', correct: false },
          { text: '威逼利诱，软硬兼施', correct: false },
          { text: '单独行动，不靠诸侯', correct: false }
        ],
        correctResponse: '刘备高呼："吾乃汉室宗亲，今董贼乱政，正是诸君报国之时！"诸侯闻言，纷纷挥军掩杀！',
        wrongResponse: '诸侯各怀私心，按兵不动。刘备叹息，知人心难齐。'
      },
      wait: {
        speaker: { name: '关羽', title: '武圣', avatar: 'images/guanyu.png' },
        intro: '关羽战至酣处，见刘备未动，高声叫道：',
        question: '"大哥！我与三弟力战吕布，正是用人之际，何故不来相助？"',
        options: [
          { text: '立即上阵，不负兄弟之义', correct: true },
          { text: '静待时机，伺机而动', correct: false },
          { text: '保存实力，留待后用', correct: false },
          { text: '让诸侯先上，我为后援', correct: false }
        ],
        correctResponse: '刘备闻言，提剑上马："二弟三弟！为兄来也！"三兄弟齐心，吕布招架不住，败走虎牢关！',
        wrongResponse: '关羽怒道："枉我等桃园结义，同生共死！"张飞亦心生不满，三人配合渐失默契。'
      }
    };

    const endings = {
      victory: {
        title: '三英战吕布',
        desc: '刘关张三兄弟合力战吕布，方天画戟难敌三人夹攻！吕布虚晃一招，拨马便走，逃回虎牢关中。此战三人名扬天下，"三英战吕布"传为千古佳话！',
        historyTitle: '三英战吕布的历史与演义',
        historyText: '历史上"三英战吕布"是《三国演义》的虚构情节。真实历史中，虎牢关之战确有其事，但刘关张并未与吕布单独交锋。然而，这一情节完美展现了三兄弟的勇武和情义，成为三国故事中最经典的场面之一。'
      },
      defeat: {
        title: '错失良机',
        desc: '三人配合不当，吕布寻得破绽，全身而退。诸侯联军士气受挫，虎牢关久攻不下...',
        historyTitle: '吕布的武艺',
        historyText: '吕布被誉为三国第一猛将，"人中吕布，马中赤兔"。其武艺之高，在当时无人能及。即便是关羽、张飞这样的绝世猛将，也需联手方能与之一战。'
      }
    };

    let currentPath = '';
    let progress = 0;

    function updateProgress(value) {
      progress = value;
      document.getElementById('progressFill').style.width = value + '%';
    }

    function showChoices() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('choicesPanel').style.display = 'block';
      document.getElementById('choicesPanel').classList.add('fade-in');
      updateProgress(25);
    }

    function selectPath(path) {
      currentPath = path;
      const data = quizData[path];
      
      document.getElementById('choicesPanel').style.display = 'none';
      const quizPanel = document.getElementById('quizPanel');
      quizPanel.style.display = 'block';
      quizPanel.classList.add('active', 'fade-in');

      document.getElementById('quizSpeaker').innerHTML = `
        <img src="${data.speaker.avatar}" alt="${data.speaker.name}" class="speaker-avatar">
        <div class="speaker-info">
          <span class="speaker-name">${data.speaker.name}</span>
          <span class="speaker-title">${data.speaker.title}</span>
        </div>
      `;

      document.getElementById('quizQuestion').innerHTML = `
        <p style="margin-bottom: 1rem; color: var(--text-secondary);">${data.intro}</p>
        <p>${data.question}</p>
      `;

      const optionsHtml = data.options.map((opt, i) => `
        <button class="quiz-option" onclick="checkAnswer(${i}, ${opt.correct})">
          ${String.fromCharCode(65 + i)}. ${opt.text}
        </button>
      `).join('');
      document.getElementById('quizOptions').innerHTML = optionsHtml;

      updateProgress(50);
    }

    function checkAnswer(index, isCorrect) {
      const options = document.querySelectorAll('.quiz-option');
      const data = quizData[currentPath];
      
      options.forEach((opt, i) => {
        opt.classList.add('disabled');
        if (data.options[i].correct) {
          opt.classList.add('correct');
        } else if (i === index && !isCorrect) {
          opt.classList.add('wrong');
        }
      });

      updateProgress(75);

      setTimeout(() => {
        const response = isCorrect ? data.correctResponse : data.wrongResponse;
        document.getElementById('quizQuestion').innerHTML += `
          <p style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); color: ${isCorrect ? 'var(--accent-gold)' : 'var(--accent-red)'};">
            ${response}
          </p>
        `;

        document.getElementById('quizOptions').innerHTML += `
          <button class="action-btn primary" style="margin-top: 1.5rem;" onclick="showEnding(${isCorrect})">
            ${isCorrect ? '乘胜追击' : '收兵回营'}
          </button>
        `;
      }, 800);
    }

    function showEnding(isVictory) {
      const ending = isVictory ? endings.victory : endings.defeat;
      
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('quizPanel').style.display = 'none';
      
      const endingPanel = document.getElementById('endingPanel');
      endingPanel.style.display = 'block';
      endingPanel.classList.add('active', 'fade-in');

      document.getElementById('endingTitle').textContent = ending.title;
      document.getElementById('endingTitle').classList.add(isVictory ? 'victory' : 'defeat');
      document.getElementById('endingDesc').textContent = ending.desc;
      document.getElementById('historyTitle').textContent = ending.historyTitle;
      document.getElementById('historyText').textContent = ending.historyText;

      if (isVictory) {
        document.getElementById('dustOverlay').classList.add('active');
      }

      updateProgress(100);
    }

    function restart() {
      document.getElementById('intro').style.display = 'block';
      document.getElementById('choicesPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('endingPanel').style.display = 'none';
      document.getElementById('endingPanel').classList.remove('active');
      document.getElementById('endingTitle').classList.remove('victory', 'defeat');
      document.getElementById('dustOverlay').classList.remove('active');
      
      currentPath = '';
      updateProgress(0);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
