<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>官渡之战 · 交互战场</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1612;
      --bg-secondary: #241f1a;
      --bg-card: #2a2420;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --border: rgba(201, 165, 92, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .scene-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .scene-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1612 0%, #1a1a2a 50%, #1a1612 100%);
      z-index: -2;
    }

    .scene-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('images/guandu.jpg') center/cover;
      opacity: 0.3;
      filter: sepia(30%) brightness(0.6);
    }

    .fire-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(0deg, rgba(255, 150, 50, 0.3) 0%, transparent 100%);
      z-index: -1;
      opacity: 0;
      transition: opacity 1s;
    }

    .fire-overlay.active {
      opacity: 1;
      animation: fireFlicker 0.5s ease-in-out infinite alternate;
    }

    @keyframes fireFlicker {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: linear-gradient(180deg, rgba(26, 22, 18, 0.95) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .back-btn:hover { color: var(--text-primary); }

    .scene-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      color: var(--accent-gold);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    .scene-year {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .narrative-panel {
      background: rgba(26, 22, 18, 0.95);
      border: 1px solid var(--border);
      padding: 2.5rem;
      margin-bottom: 2rem;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .narrative-text {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-primary);
      text-align: justify;
      margin-bottom: 1.5rem;
    }

    .narrative-text .highlight {
      color: var(--accent-gold);
      font-weight: 500;
    }

    .speaker {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .speaker-avatar {
      width: 60px;
      height: 60px;
      border: 2px solid var(--accent-gold);
      object-fit: cover;
      object-position: top;
    }

    .speaker-name {
      font-size: 1.1rem;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .speaker-title {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }

    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
      transform: translateX(8px);
    }

    .choice-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--accent-gold);
      font-weight: 600;
      flex-shrink: 0;
    }

    .choice-text { flex: 1; }

    .choice-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    .quiz-panel {
      display: none;
      width: 100%;
    }

    .quiz-panel.active { display: block; }

    .quiz-question {
      font-size: 1.15rem;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .quiz-option {
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .quiz-option:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
    }

    .quiz-option.correct {
      border-color: var(--accent-green);
      background: rgba(90, 138, 90, 0.2);
    }

    .quiz-option.wrong {
      border-color: var(--accent-red);
      background: rgba(179, 60, 60, 0.2);
    }

    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .ending-panel {
      display: none;
      width: 100%;
      text-align: center;
    }

    .ending-panel.active { display: block; }

    .ending-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .ending-title.victory {
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(201, 165, 92, 0.5);
    }

    .ending-title.defeat {
      color: var(--accent-red);
      text-shadow: 0 0 20px rgba(179, 60, 60, 0.5);
    }

    .ending-desc {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .history-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2rem;
      margin: 2rem 0;
      text-align: left;
    }

    .history-card-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      color: var(--accent-gold);
      font-size: 0.9rem;
    }

    .history-card-title {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .history-card-text {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-secondary);
    }

    .action-btns {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .action-btn {
      padding: 1rem 2rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-btn.primary {
      background: var(--accent-gold);
      border: none;
      color: var(--bg-primary);
    }

    .action-btn.primary:hover { background: #d9b56c; }

    .action-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .action-btn.secondary:hover { border-color: var(--accent-gold); }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--bg-secondary);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gold);
      transition: width 0.5s ease;
    }

    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in {
      animation: slideIn 0.4s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 768px) {
      .narrative-panel { padding: 1.5rem; }
      .scene-title { font-size: 1.4rem; }
      .ending-title { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="scene-bg"></div>
    <div class="fire-overlay" id="fireOverlay"></div>

    <div class="top-bar">
      <a href="index.html#attractions" class="back-btn">← 返回遗迹</a>
      <div style="text-align: center;">
        <div class="scene-title">官渡之战</div>
        <div class="scene-year">建安五年 · 公元200年</div>
      </div>
      <div style="width: 80px;"></div>
    </div>

    <div class="main-content">
      <!-- 开场叙事 -->
      <div class="narrative-panel fade-in" id="intro">
        <div class="narrative-text">
          <span class="highlight">建安五年</span>，袁绍尽起冀、青、幽、并四州之兵，号称七十万大军，南下攻打许都。
        </div>
        <div class="narrative-text">
          曹操兵不过七万，粮草将尽，退守官渡。两军相持数月，曹军士气低落，军中已有叛逃之心。
        </div>
        <div class="narrative-text">
          谋士<span class="highlight">许攸</span>因家人被审配收押，愤而投奔曹操，献上绝密军情——袁绍粮草尽囤于<span class="highlight">乌巢</span>，守将淳于琼嗜酒如命。
        </div>
        <div class="narrative-text" style="color: var(--accent-gold);">
          千载难逢的战机已现，曹公当如何决断？
        </div>
        <button class="action-btn primary" onclick="showChoices()" style="margin-top: 1rem;">
          进入战场
        </button>
      </div>

      <!-- 选择面板 -->
      <div class="narrative-panel" id="choicesPanel" style="display: none;">
        <div class="speaker">
          <img src="images/caocao.png" alt="曹操" class="speaker-avatar">
          <div class="speaker-info">
            <span class="speaker-name">曹操</span>
            <span class="speaker-title">司空 · 丞相</span>
          </div>
        </div>
        <div class="narrative-text">
          "许攸来投，言袁绍粮草尽在乌巢，守将淳于琼不过酒囊饭袋。此乃天赐良机！"
        </div>
        <div class="narrative-text">
          "然乌巢在袁绍大营之后，轻骑奇袭，一旦被发现，我军必陷重围。诸君以为如何？"
        </div>
        <div class="choices" id="mainChoices">
          <button class="choice-btn slide-in" onclick="selectPath('raid')" style="animation-delay: 0.1s">
            <span class="choice-icon">壹</span>
            <div class="choice-text">
              亲率精骑夜袭乌巢
              <div class="choice-hint">兵行险招，火烧粮草，釜底抽薪</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('defend')" style="animation-delay: 0.2s">
            <span class="choice-icon">贰</span>
            <div class="choice-text">
              坚守官渡以待时变
              <div class="choice-hint">稳扎稳打，等待袁军内部生变</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('attack')" style="animation-delay: 0.3s">
            <span class="choice-icon">叁</span>
            <div class="choice-text">
              正面强攻袁绍大营
              <div class="choice-hint">趁敌不备，一战定乾坤</div>
            </div>
          </button>
        </div>
      </div>

      <!-- 问答面板 -->
      <div class="narrative-panel quiz-panel" id="quizPanel">
        <div class="speaker" id="quizSpeaker"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>

      <!-- 结局面板 -->
      <div class="narrative-panel ending-panel" id="endingPanel">
        <div class="ending-title" id="endingTitle"></div>
        <div class="ending-desc" id="endingDesc"></div>
        <div class="history-card">
          <div class="history-card-header">📜 历史真相</div>
          <div class="history-card-title" id="historyTitle"></div>
          <div class="history-card-text" id="historyText"></div>
        </div>
        <div class="action-btns">
          <button class="action-btn secondary" onclick="restart()">重新挑战</button>
          <button class="action-btn primary" onclick="location.href='index.html#attractions'">返回遗迹</button>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <script>
    const quizData = {
      raid: {
        speaker: { name: '荀攸', title: '军师', avatar: 'images/caocao.png' },
        intro: '荀攸进言道：',
        question: '"主公欲袭乌巢，当带多少兵马？兵多则易被发现，兵少则难以成事。"',
        options: [
          { text: '五千精骑，轻装简行，速去速回', correct: true },
          { text: '两万大军，稳扎稳打，确保万全', correct: false },
          { text: '一千死士，隐秘潜行，出其不意', correct: false },
          { text: '倾巢而出，毕其功于一役', correct: false }
        ],
        correctResponse: '荀攸点头道："五千精骑足矣！轻骑速进，火烧粮草即走，袁绍必然大乱！"',
        wrongResponse: '荀攸摇头叹息："兵法有云，奇正相合。此计非五千精骑不可为也。"'
      },
      defend: {
        speaker: { name: '荀彧', title: '尚书令', avatar: 'images/caocao.png' },
        intro: '荀彧收到曹操书信，急忙回复：',
        question: '"主公言粮尽欲退，然此时正是用奇之时。公可知袁绍最大弱点为何？"',
        options: [
          { text: '袁绍刚愎自用，不纳忠言', correct: true },
          { text: '袁军人数虽多，但战力不强', correct: false },
          { text: '袁绍后方空虚，可遣偏师袭扰', correct: false },
          { text: '袁军粮道过长，补给困难', correct: false }
        ],
        correctResponse: '荀彧书曰："袁绍刚愎自用，谋臣离心。许攸来投即为明证，此时用奇，必获全胜！"',
        wrongResponse: '荀彧叹道："主公所虑不差，然未中要害。袁绍之败，败在不能用人也。"'
      },
      attack: {
        speaker: { name: '郭嘉', title: '军师祭酒', avatar: 'images/caocao.png' },
        intro: '郭嘉闻言，急忙劝阻：',
        question: '"主公，袁绍虽庸，其军十倍于我。若正面强攻，胜算几何？兵法云：十则围之，五则攻之。我军当如何？"',
        options: [
          { text: '兵少则应用奇，不可力敌', correct: true },
          { text: '士气可用，一鼓作气可胜', correct: false },
          { text: '先发制人，打敌不备', correct: false },
          { text: '破釜沉舟，置之死地而后生', correct: false }
        ],
        correctResponse: '郭嘉赞道："主公明见！以少敌多，唯有出奇制胜。乌巢之计，方为上策！"',
        wrongResponse: '郭嘉摇头："正面强攻，以卵击石。主公当三思啊！"'
      }
    };

    const endings = {
      victory: {
        title: '火烧乌巢',
        desc: '曹操亲率五千精骑，夜袭乌巢。袁军粮草尽焚，军心大乱。袁绍仓皇北逃，七十万大军土崩瓦解。官渡一战，曹操以少胜多，奠定统一北方之基业！',
        historyTitle: '官渡之战的历史意义',
        historyText: '官渡之战是中国历史上著名的以少胜多的战役，也是曹操统一北方的关键之战。此战曹操以约两万兵力击败袁绍十万大军，充分展现了曹操卓越的军事才能和果断的决策能力。许攸来投、火烧乌巢成为后世津津乐道的经典战例。'
      },
      defeat: {
        title: '错失良机',
        desc: '战机稍纵即逝，袁绍发觉许攸叛逃，加强了乌巢守备。曹军粮尽，被迫撤退。北方统一之路，尚需时日...',
        historyTitle: '如果官渡之战失败',
        historyText: '若曹操在官渡战败，袁绍将挥师南下，直取许都。曹操苦心经营的基业将毁于一旦，汉献帝可能落入袁绍之手。历史的走向将完全不同，三国鼎立的局面或许永远不会出现。'
      }
    };

    let currentPath = '';
    let progress = 0;

    function updateProgress(value) {
      progress = value;
      document.getElementById('progressFill').style.width = value + '%';
    }

    function showChoices() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('choicesPanel').style.display = 'block';
      document.getElementById('choicesPanel').classList.add('fade-in');
      updateProgress(25);
    }

    function selectPath(path) {
      currentPath = path;
      const data = quizData[path];
      
      document.getElementById('choicesPanel').style.display = 'none';
      const quizPanel = document.getElementById('quizPanel');
      quizPanel.style.display = 'block';
      quizPanel.classList.add('active', 'fade-in');

      document.getElementById('quizSpeaker').innerHTML = `
        <img src="${data.speaker.avatar}" alt="${data.speaker.name}" class="speaker-avatar">
        <div class="speaker-info">
          <span class="speaker-name">${data.speaker.name}</span>
          <span class="speaker-title">${data.speaker.title}</span>
        </div>
      `;

      document.getElementById('quizQuestion').innerHTML = `
        <p style="margin-bottom: 1rem; color: var(--text-secondary);">${data.intro}</p>
        <p>${data.question}</p>
      `;

      const optionsHtml = data.options.map((opt, i) => `
        <button class="quiz-option" onclick="checkAnswer(${i}, ${opt.correct})">
          ${String.fromCharCode(65 + i)}. ${opt.text}
        </button>
      `).join('');
      document.getElementById('quizOptions').innerHTML = optionsHtml;

      updateProgress(50);
    }

    function checkAnswer(index, isCorrect) {
      const options = document.querySelectorAll('.quiz-option');
      const data = quizData[currentPath];
      
      options.forEach((opt, i) => {
        opt.classList.add('disabled');
        if (data.options[i].correct) {
          opt.classList.add('correct');
        } else if (i === index && !isCorrect) {
          opt.classList.add('wrong');
        }
      });

      updateProgress(75);

      setTimeout(() => {
        const response = isCorrect ? data.correctResponse : data.wrongResponse;
        document.getElementById('quizQuestion').innerHTML += `
          <p style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); color: ${isCorrect ? 'var(--accent-gold)' : 'var(--accent-red)'};">
            ${response}
          </p>
        `;

        document.getElementById('quizOptions').innerHTML += `
          <button class="action-btn primary" style="margin-top: 1.5rem;" onclick="showEnding(${isCorrect})">
            ${isCorrect ? '发起总攻' : '继续观战'}
          </button>
        `;
      }, 800);
    }

    function showEnding(isVictory) {
      const ending = isVictory ? endings.victory : endings.defeat;
      
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('quizPanel').style.display = 'none';
      
      const endingPanel = document.getElementById('endingPanel');
      endingPanel.style.display = 'block';
      endingPanel.classList.add('active', 'fade-in');

      document.getElementById('endingTitle').textContent = ending.title;
      document.getElementById('endingTitle').classList.add(isVictory ? 'victory' : 'defeat');
      document.getElementById('endingDesc').textContent = ending.desc;
      document.getElementById('historyTitle').textContent = ending.historyTitle;
      document.getElementById('historyText').textContent = ending.historyText;

      if (isVictory) {
        document.getElementById('fireOverlay').classList.add('active');
      }

      updateProgress(100);
    }

    function restart() {
      document.getElementById('intro').style.display = 'block';
      document.getElementById('choicesPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('endingPanel').style.display = 'none';
      document.getElementById('endingPanel').classList.remove('active');
      document.getElementById('endingTitle').classList.remove('victory', 'defeat');
      document.getElementById('fireOverlay').classList.remove('active');
      
      currentPath = '';
      updateProgress(0);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
