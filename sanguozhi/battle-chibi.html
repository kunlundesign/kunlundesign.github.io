<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赤壁之战 · 交互战场</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1612;
      --bg-secondary: #241f1a;
      --bg-card: #2a2420;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --border: rgba(201, 165, 92, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 场景容器 */
    .scene-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 背景 */
    .scene-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1612 0%, #2a1a1a 50%, #1a1612 100%);
      z-index: -2;
    }

    .scene-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('images/chibi.jpg') center/cover;
      opacity: 0.3;
      filter: sepia(30%) brightness(0.6);
    }

    /* 火焰动画 */
    .fire-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(0deg, rgba(179, 60, 60, 0.3) 0%, transparent 100%);
      z-index: -1;
      opacity: 0;
      transition: opacity 1s;
    }

    .fire-overlay.active {
      opacity: 1;
      animation: fireFlicker 0.5s ease-in-out infinite alternate;
    }

    @keyframes fireFlicker {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    /* 顶部导航 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: linear-gradient(180deg, rgba(26, 22, 18, 0.95) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .back-btn:hover {
      color: var(--text-primary);
    }

    .scene-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      color: var(--accent-gold);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    .scene-year {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* 叙事面板 */
    .narrative-panel {
      background: rgba(26, 22, 18, 0.95);
      border: 1px solid var(--border);
      padding: 2.5rem;
      margin-bottom: 2rem;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .narrative-text {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-primary);
      text-align: justify;
      margin-bottom: 1.5rem;
    }

    .narrative-text .highlight {
      color: var(--accent-gold);
      font-weight: 500;
    }

    .speaker {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .speaker-avatar {
      width: 60px;
      height: 60px;
      border: 2px solid var(--accent-gold);
      object-fit: cover;
      object-position: top;
    }

    .speaker-info {
      display: flex;
      flex-direction: column;
    }

    .speaker-name {
      font-size: 1.1rem;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .speaker-title {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* 选择按钮 */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }

    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
      transform: translateX(8px);
    }

    .choice-btn:active {
      transform: translateX(4px);
    }

    .choice-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--accent-gold);
      font-weight: 600;
      flex-shrink: 0;
    }

    .choice-text {
      flex: 1;
    }

    .choice-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    /* 问答面板 */
    .quiz-panel {
      display: none;
      width: 100%;
    }

    .quiz-panel.active {
      display: block;
    }

    .quiz-question {
      font-size: 1.15rem;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .quiz-option {
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .quiz-option:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
    }

    .quiz-option.correct {
      border-color: var(--accent-green);
      background: rgba(90, 138, 90, 0.2);
    }

    .quiz-option.wrong {
      border-color: var(--accent-red);
      background: rgba(179, 60, 60, 0.2);
    }

    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    /* 结局面板 */
    .ending-panel {
      display: none;
      width: 100%;
      text-align: center;
    }

    .ending-panel.active {
      display: block;
    }

    .ending-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .ending-title.victory {
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(201, 165, 92, 0.5);
    }

    .ending-title.defeat {
      color: var(--accent-red);
      text-shadow: 0 0 20px rgba(179, 60, 60, 0.5);
    }

    .ending-desc {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    /* 历史知识卡片 */
    .history-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2rem;
      margin: 2rem 0;
      text-align: left;
    }

    .history-card-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      color: var(--accent-gold);
      font-size: 0.9rem;
    }

    .history-card-title {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .history-card-text {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-secondary);
    }

    /* 操作按钮 */
    .action-btns {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .action-btn {
      padding: 1rem 2rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-btn.primary {
      background: var(--accent-gold);
      border: none;
      color: var(--bg-primary);
    }

    .action-btn.primary:hover {
      background: #d9b56c;
    }

    .action-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .action-btn.secondary:hover {
      border-color: var(--accent-gold);
    }

    /* 进度指示 */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--bg-secondary);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gold);
      transition: width 0.5s ease;
    }

    /* 动画 */
    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in {
      animation: slideIn 0.4s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .narrative-panel {
        padding: 1.5rem;
      }
      
      .scene-title {
        font-size: 1.4rem;
      }
      
      .ending-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="scene-bg"></div>
    <div class="fire-overlay" id="fireOverlay"></div>

    <div class="top-bar">
      <a href="index.html#attractions" class="back-btn">
        ← 返回遗迹
      </a>
      <div style="text-align: center;">
        <div class="scene-title">赤壁之战</div>
        <div class="scene-year">建安十三年 · 公元208年</div>
      </div>
      <div style="width: 80px;"></div>
    </div>

    <div class="main-content">
      <!-- 开场叙事 -->
      <div class="narrative-panel fade-in" id="intro">
        <div class="narrative-text">
          <span class="highlight">建安十三年冬</span>，曹操率二十万大军南下，号称八十万。荆州刘琮不战而降，刘备败走夏口。
        </div>
        <div class="narrative-text">
          江东孙权与刘备结盟，以<span class="highlight">周瑜</span>为都督，<span class="highlight">诸葛亮</span>为军师，率五万联军退守赤壁，与曹军隔江对峙。
        </div>
        <div class="narrative-text">
          曹军北人不习水战，多生疾病。庞统献连环计，曹操将战船首尾相连。东吴大将<span class="highlight">黄盖</span>诈降，准备火攻。
        </div>
        <div class="narrative-text" style="color: var(--accent-gold);">
          万事俱备，只欠东风。然时值隆冬，江上只有西北风...
        </div>
        <button class="action-btn primary" onclick="showChoices()" style="margin-top: 1rem;">
          进入战场
        </button>
      </div>

      <!-- 选择面板 -->
      <div class="narrative-panel" id="choicesPanel" style="display: none;">
        <div class="speaker">
          <img src="images/zhouyu.png" alt="周瑜" class="speaker-avatar">
          <div class="speaker-info">
            <span class="speaker-name">周瑜</span>
            <span class="speaker-title">东吴大都督</span>
          </div>
        </div>
        <div class="narrative-text">
          "火攻之计已定，黄盖诈降信已送出。然此时西北风盛，若贸然用火，只会烧到我军自己。"
        </div>
        <div class="narrative-text">
          "诸葛先生言他能借来东风，但此事太过玄妙。将军，你以为我军当如何行事？"
        </div>
        <div class="choices" id="mainChoices">
          <button class="choice-btn slide-in" onclick="selectPath('wind')" style="animation-delay: 0.1s">
            <span class="choice-icon">壹</span>
            <div class="choice-text">
              协助诸葛亮借东风
              <div class="choice-hint">前往七星坛，协助孔明施法借风</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('fire')" style="animation-delay: 0.2s">
            <span class="choice-icon">贰</span>
            <div class="choice-text">
              向周瑜献火攻细节
              <div class="choice-hint">协助完善火攻战术，确保万无一失</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('spy')" style="animation-delay: 0.3s">
            <span class="choice-icon">叁</span>
            <div class="choice-text">
              潜入曹营刺探军情
              <div class="choice-hint">化装混入敌营，掌握曹军虚实</div>
            </div>
          </button>
        </div>
      </div>

      <!-- 问答面板 -->
      <div class="narrative-panel quiz-panel" id="quizPanel">
        <div class="speaker" id="quizSpeaker"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>

      <!-- 结局面板 -->
      <div class="narrative-panel ending-panel" id="endingPanel">
        <div class="ending-title" id="endingTitle"></div>
        <div class="ending-desc" id="endingDesc"></div>
        <div class="history-card">
          <div class="history-card-header">
            📜 历史真相
          </div>
          <div class="history-card-title" id="historyTitle"></div>
          <div class="history-card-text" id="historyText"></div>
        </div>
        <div class="action-btns">
          <button class="action-btn secondary" onclick="restart()">重新挑战</button>
          <button class="action-btn primary" onclick="location.href='index.html#attractions'">返回遗迹</button>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <script>
    // 题库
    const quizData = {
      wind: {
        speaker: { name: '诸葛亮', title: '卧龙先生', avatar: 'images/zhugeliang.png' },
        intro: '你来到七星坛，只见诸葛亮身披道袍，手持宝剑，正在布置法坛。见你前来，他微微一笑：',
        question: '"将军可知，冬季长江为何多西北风？若要借来东南风，需等何种天象？"',
        options: [
          { text: '等待冷暖气流交汇，形成短暂的东南风', correct: true },
          { text: '月圆之夜，潮汐引动，风向自然改变', correct: false },
          { text: '点燃大量火把，以热气引动风向', correct: false },
          { text: '需七七四十九日，方能借得天风', correct: false }
        ],
        correctResponse: '诸葛亮点头道："将军深通天文！冬至前后，确有暖湿气流北上，与冷空气交汇，可形成短暂东南风。今夜三更，便是时机！"',
        wrongResponse: '诸葛亮摇头叹息："将军不通天文，恐难助我。"他独自登上法坛，你只能在一旁等候...'
      },
      fire: {
        speaker: { name: '周瑜', title: '东吴大都督', avatar: 'images/zhouyu.png' },
        intro: '周瑜将你请入帐中，摊开江防图，指着曹军水寨：',
        question: '"曹军战船已被铁链相连，若行火攻，将军以为当用何物引火为佳？"',
        options: [
          { text: '装满干草、油脂的蒙冲斗舰', correct: true },
          { text: '火箭齐射，点燃风帆', correct: false },
          { text: '派人泅水，在船底纵火', correct: false },
          { text: '投石机投掷火球', correct: false }
        ],
        correctResponse: '周瑜击掌道："妙哉！蒙冲斗舰装满薪草膏油，借黄盖诈降之机，直冲敌营，火借风势，风助火威，曹军必败！"',
        wrongResponse: '周瑜皱眉道："此计难成。曹军水寨严密，寻常火攻难以奏效..."'
      },
      spy: {
        speaker: { name: '鲁肃', title: '东吴谋士', avatar: 'images/sunquan.png' },
        intro: '鲁肃找到你，神色凝重：',
        question: '"曹操帐下有二将，本为荆州降将，深谙水战。曹操疑其有二心，你可知是哪二人？"',
        options: [
          { text: '蔡瑁、张允', correct: true },
          { text: '于禁、李典', correct: false },
          { text: '曹仁、曹洪', correct: false },
          { text: '徐晃、张辽', correct: false }
        ],
        correctResponse: '鲁肃低声道："正是！周都督已行反间计，借蒋干之手，让曹操误杀此二人。曹军水寨，已无人能统领！"',
        wrongResponse: '鲁肃叹息道："将军不识敌将，此行恐有风险..."'
      }
    };

    const endings = {
      victory: {
        title: '火烧赤壁',
        desc: '东风骤起，黄盖率火船直冲曹营。风助火势，曹军大寨顷刻间化为火海。曹操败走华容道，八十万大军灰飞烟灭。此战奠定三分天下之势！',
        historyTitle: '赤壁之战的历史意义',
        historyText: '赤壁之战是中国历史上著名的以少胜多的战役。此战确立了三国鼎立的局面：曹操退回北方，再无力南征；孙权稳固江东基业；刘备趁机取得荆州，为后来建立蜀汉奠定基础。周瑜的火攻战术和诸葛亮的外交斡旋，成为后世兵家经典案例。'
      },
      defeat: {
        title: '功亏一篑',
        desc: '计划出现疏漏，火攻未能奏效。曹军虽有损失，但主力尚存。孙刘联军被迫后撤，江东危在旦夕...',
        historyTitle: '如果赤壁之战失败',
        historyText: '历史没有如果，但若赤壁之战曹操获胜，三国鼎立的局面将不复存在。曹操将统一南方，东汉末年的分裂局面可能提前结束。刘备、孙权的势力将被彻底消灭，诸葛亮的"隆中对"战略也将化为泡影。'
      }
    };

    let currentPath = '';
    let progress = 0;

    function updateProgress(value) {
      progress = value;
      document.getElementById('progressFill').style.width = value + '%';
    }

    function showChoices() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('choicesPanel').style.display = 'block';
      document.getElementById('choicesPanel').classList.add('fade-in');
      updateProgress(25);
    }

    function selectPath(path) {
      currentPath = path;
      const data = quizData[path];
      
      // 显示问答面板
      document.getElementById('choicesPanel').style.display = 'none';
      const quizPanel = document.getElementById('quizPanel');
      quizPanel.style.display = 'block';
      quizPanel.classList.add('active', 'fade-in');

      // 设置说话人
      document.getElementById('quizSpeaker').innerHTML = `
        <img src="${data.speaker.avatar}" alt="${data.speaker.name}" class="speaker-avatar">
        <div class="speaker-info">
          <span class="speaker-name">${data.speaker.name}</span>
          <span class="speaker-title">${data.speaker.title}</span>
        </div>
      `;

      // 设置问题
      document.getElementById('quizQuestion').innerHTML = `
        <p style="margin-bottom: 1rem; color: var(--text-secondary);">${data.intro}</p>
        <p>${data.question}</p>
      `;

      // 设置选项
      const optionsHtml = data.options.map((opt, i) => `
        <button class="quiz-option" onclick="checkAnswer(${i}, ${opt.correct})">
          ${String.fromCharCode(65 + i)}. ${opt.text}
        </button>
      `).join('');
      document.getElementById('quizOptions').innerHTML = optionsHtml;

      updateProgress(50);
    }

    function checkAnswer(index, isCorrect) {
      const options = document.querySelectorAll('.quiz-option');
      const data = quizData[currentPath];
      
      // 禁用所有选项
      options.forEach((opt, i) => {
        opt.classList.add('disabled');
        if (data.options[i].correct) {
          opt.classList.add('correct');
        } else if (i === index && !isCorrect) {
          opt.classList.add('wrong');
        }
      });

      updateProgress(75);

      // 显示反馈
      setTimeout(() => {
        const response = isCorrect ? data.correctResponse : data.wrongResponse;
        document.getElementById('quizQuestion').innerHTML += `
          <p style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); color: ${isCorrect ? 'var(--accent-gold)' : 'var(--accent-red)'};">
            ${response}
          </p>
        `;

        // 添加继续按钮
        document.getElementById('quizOptions').innerHTML += `
          <button class="action-btn primary" style="margin-top: 1.5rem;" onclick="showEnding(${isCorrect})">
            ${isCorrect ? '发起总攻' : '继续观战'}
          </button>
        `;
      }, 800);
    }

    function showEnding(isVictory) {
      const ending = isVictory ? endings.victory : endings.defeat;
      
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('quizPanel').style.display = 'none';
      
      const endingPanel = document.getElementById('endingPanel');
      endingPanel.style.display = 'block';
      endingPanel.classList.add('active', 'fade-in');

      document.getElementById('endingTitle').textContent = ending.title;
      document.getElementById('endingTitle').classList.add(isVictory ? 'victory' : 'defeat');
      document.getElementById('endingDesc').textContent = ending.desc;
      document.getElementById('historyTitle').textContent = ending.historyTitle;
      document.getElementById('historyText').textContent = ending.historyText;

      // 胜利时显示火焰效果
      if (isVictory) {
        document.getElementById('fireOverlay').classList.add('active');
      }

      updateProgress(100);
    }

    function restart() {
      // 重置所有面板
      document.getElementById('intro').style.display = 'block';
      document.getElementById('choicesPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('endingPanel').style.display = 'none';
      document.getElementById('endingPanel').classList.remove('active');
      document.getElementById('endingTitle').classList.remove('victory', 'defeat');
      document.getElementById('fireOverlay').classList.remove('active');
      
      currentPath = '';
      updateProgress(0);
      
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
