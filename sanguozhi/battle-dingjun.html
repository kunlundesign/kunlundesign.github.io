<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定军山之战 · 交互战场</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1612;
      --bg-secondary: #241f1a;
      --bg-card: #2a2420;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --border: rgba(201, 165, 92, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .scene-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .scene-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1612 0%, #1a2a1a 50%, #1a1612 100%);
      z-index: -2;
    }

    .scene-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('images/dingjun.jpg') center/cover;
      opacity: 0.3;
      filter: sepia(30%) brightness(0.6);
    }

    .victory-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(201, 165, 92, 0.2) 0%, transparent 70%);
      z-index: -1;
      opacity: 0;
      transition: opacity 1s;
    }

    .victory-overlay.active {
      opacity: 1;
      animation: victoryPulse 2s ease-in-out infinite alternate;
    }

    @keyframes victoryPulse {
      from { opacity: 0.3; }
      to { opacity: 0.6; }
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: linear-gradient(180deg, rgba(26, 22, 18, 0.95) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .back-btn:hover { color: var(--text-primary); }

    .scene-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      color: var(--accent-gold);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    .scene-year {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .narrative-panel {
      background: rgba(26, 22, 18, 0.95);
      border: 1px solid var(--border);
      padding: 2.5rem;
      margin-bottom: 2rem;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .narrative-text {
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-primary);
      text-align: justify;
      margin-bottom: 1.5rem;
    }

    .narrative-text .highlight { color: var(--accent-gold); font-weight: 500; }
    .narrative-text .danger { color: var(--accent-red); font-weight: 500; }

    .speaker {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .speaker-avatar {
      width: 60px;
      height: 60px;
      border: 2px solid var(--accent-gold);
      object-fit: cover;
      object-position: top;
    }

    .speaker-name { font-size: 1.1rem; color: var(--accent-gold); font-weight: 600; }
    .speaker-title { font-size: 0.8rem; color: var(--text-secondary); }

    .choices { display: flex; flex-direction: column; gap: 1rem; width: 100%; }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }

    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
      transform: translateX(8px);
    }

    .choice-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--accent-gold);
      font-weight: 600;
      flex-shrink: 0;
    }

    .choice-text { flex: 1; }
    .choice-hint { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.3rem; }

    .quiz-panel { display: none; width: 100%; }
    .quiz-panel.active { display: block; }

    .quiz-question { font-size: 1.15rem; color: var(--text-primary); margin-bottom: 1.5rem; line-height: 1.8; }
    .quiz-options { display: flex; flex-direction: column; gap: 0.8rem; }

    .quiz-option {
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .quiz-option:hover { border-color: var(--accent-gold); background: rgba(201, 165, 92, 0.1); }
    .quiz-option.correct { border-color: var(--accent-green); background: rgba(90, 138, 90, 0.2); }
    .quiz-option.wrong { border-color: var(--accent-red); background: rgba(179, 60, 60, 0.2); }
    .quiz-option.disabled { pointer-events: none; opacity: 0.6; }

    .ending-panel { display: none; width: 100%; text-align: center; }
    .ending-panel.active { display: block; }

    .ending-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2.5rem; margin-bottom: 1rem; }
    .ending-title.victory { color: var(--accent-gold); text-shadow: 0 0 20px rgba(201, 165, 92, 0.5); }
    .ending-title.defeat { color: var(--accent-red); text-shadow: 0 0 20px rgba(179, 60, 60, 0.5); }

    .ending-desc { font-size: 1.1rem; line-height: 2; color: var(--text-secondary); margin-bottom: 2rem; }

    .history-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2rem;
      margin: 2rem 0;
      text-align: left;
    }

    .history-card-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; color: var(--accent-gold); font-size: 0.9rem; }
    .history-card-title { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 1rem; font-weight: 500; }
    .history-card-text { font-size: 0.95rem; line-height: 1.9; color: var(--text-secondary); }

    .action-btns { display: flex; gap: 1rem; margin-top: 2rem; }

    .action-btn {
      padding: 1rem 2rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-btn.primary { background: var(--accent-gold); border: none; color: var(--bg-primary); }
    .action-btn.primary:hover { background: #d9b56c; }
    .action-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .action-btn.secondary:hover { border-color: var(--accent-gold); }

    .progress-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--bg-secondary); }
    .progress-fill { height: 100%; background: var(--accent-gold); transition: width 0.5s ease; }

    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.4s ease forwards; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    @media (max-width: 768px) {
      .narrative-panel { padding: 1.5rem; }
      .scene-title { font-size: 1.4rem; }
      .ending-title { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="scene-bg"></div>
    <div class="victory-overlay" id="victoryOverlay"></div>

    <div class="top-bar">
      <a href="index.html#battlefield" class="back-btn">← 返回沙场</a>
      <div style="text-align: center;">
        <div class="scene-title">定军山之战</div>
        <div class="scene-year">建安二十四年 · 公元219年</div>
      </div>
      <div style="width: 80px;"></div>
    </div>

    <div class="main-content">
      <!-- 开场叙事 -->
      <div class="narrative-panel fade-in" id="intro">
        <div class="narrative-text">
          <span class="highlight">建安二十四年</span>，刘备进取汉中，与曹操争夺益州门户。曹操遣大将<span class="danger">夏侯渊</span>镇守汉中，于定军山布防。
        </div>
        <div class="narrative-text">
          夏侯渊骁勇善战，人称"虎步关右"。刘备遣老将<span class="highlight">黄忠</span>为先锋，法正为军师，攻取定军山。
        </div>
        <div class="narrative-text">
          黄忠年逾七旬，须发皆白，然壮心不已。闻夏侯渊之名，拍案而起：
        </div>
        <div class="narrative-text" style="color: var(--accent-gold);">
          "老夫虽年迈，然宝刀未老！定斩此獠，以报主公知遇之恩！"
        </div>
        <button class="action-btn primary" onclick="showChoices()" style="margin-top: 1rem;">
          进入战场
        </button>
      </div>

      <!-- 选择面板 -->
      <div class="narrative-panel" id="choicesPanel" style="display: none;">
        <div class="speaker">
          <img src="images/huangzhong.png" alt="黄忠" class="speaker-avatar">
          <div class="speaker-info">
            <span class="speaker-name">黄忠</span>
            <span class="speaker-title">蜀汉老将</span>
          </div>
        </div>
        <div class="narrative-text">
          法正献计："夏侯渊性急，可诱其出战。将军可先占对山，居高临下，以逸待劳。"
        </div>
        <div class="narrative-text">
          黄忠点头，然心中已有计较...
        </div>
        <div class="choices" id="mainChoices">
          <button class="choice-btn slide-in" onclick="selectPath('ambush')" style="animation-delay: 0.1s">
            <span class="choice-icon">壹</span>
            <div class="choice-text">
              依法正之计，据山设伏
              <div class="choice-hint">以逸待劳，诱敌深入</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('charge')" style="animation-delay: 0.2s">
            <span class="choice-icon">贰</span>
            <div class="choice-text">
              趁敌不备，直取夏侯渊
              <div class="choice-hint">出其不意，一战而定</div>
            </div>
          </button>
          <button class="choice-btn slide-in" onclick="selectPath('fire')" style="animation-delay: 0.3s">
            <span class="choice-icon">叁</span>
            <div class="choice-text">
              烧毁敌营鹿角，逼敌出战
              <div class="choice-hint">逼虎离山，乱中取胜</div>
            </div>
          </button>
        </div>
      </div>

      <!-- 问答面板 -->
      <div class="narrative-panel quiz-panel" id="quizPanel">
        <div class="speaker" id="quizSpeaker"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>

      <!-- 结局面板 -->
      <div class="narrative-panel ending-panel" id="endingPanel">
        <div class="ending-title" id="endingTitle"></div>
        <div class="ending-desc" id="endingDesc"></div>
        <div class="history-card">
          <div class="history-card-header">📜 历史真相</div>
          <div class="history-card-title" id="historyTitle"></div>
          <div class="history-card-text" id="historyText"></div>
        </div>
        <div class="action-btns">
          <button class="action-btn secondary" onclick="restart()">重新挑战</button>
          <button class="action-btn primary" onclick="location.href='index.html#battlefield'">返回沙场</button>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <script>
    const quizData = {
      ambush: {
        speaker: { name: '法正', title: '蜀汉谋士', avatar: 'images/huangzhong.png' },
        intro: '法正道："将军据山而守，夏侯渊必来争夺。彼军远来疲惫，我军以逸待劳，胜券在握。"',
        question: '"兵法云'居高临下，势如破竹'。然夏侯渊骁勇，若其不来攻山，当如何？"',
        options: [
          { text: '遣偏师袭扰，逼其出战', correct: true },
          { text: '坚守不出，与之对峙', correct: false },
          { text: '主动下山，正面迎敌', correct: false },
          { text: '绕道偷袭其后方粮道', correct: false }
        ],
        correctResponse: '法正大笑："将军高见！夏侯渊性急如火，只需遣小队骚扰，彼必按捺不住，亲率大军来攻！"',
        wrongResponse: '法正摇头："若一味固守，旷日持久，非上策也。须设法激其出战。"'
      },
      charge: {
        speaker: { name: '黄忠', title: '蜀汉老将', avatar: 'images/huangzhong.png' },
        intro: '黄忠欲直取夏侯渊。然敌营防守严密，正面强攻，胜算几何？',
        question: '"老夫欲直取夏侯渊首级，当选何时出击？"',
        options: [
          { text: '敌修补鹿角之时，趁其不备', correct: true },
          { text: '正午敌军懈怠之时', correct: false },
          { text: '夜半三更，敌军酣睡', correct: false },
          { text: '黎明时分，敌军换防', correct: false }
        ],
        correctResponse: '黄忠道："正是此理！敌修鹿角，兵力分散，正是出击良机！"',
        wrongResponse: '黄忠叹道："时机不对，贸然出击，恐难奏效。"'
      },
      fire: {
        speaker: { name: '黄忠', title: '蜀汉老将', avatar: 'images/huangzhong.png' },
        intro: '黄忠令军士烧毁敌营鹿角。夏侯渊果然大怒，亲率精兵来救。',
        question: '"夏侯渊来势汹汹，将军当如何应对？"',
        options: [
          { text: '居高临下，待其疲惫，一鼓作气', correct: true },
          { text: '趁乱撤退，保存实力', correct: false },
          { text: '正面迎战，以武力取胜', correct: false },
          { text: '诈败诱敌，设伏包围', correct: false }
        ],
        correctResponse: '黄忠按兵不动，待夏侯渊率军登山，气力已竭。黄忠大喝一声，率军冲下，势如破竹！',
        wrongResponse: '黄忠操之过急，未能抓住战机。夏侯渊趁势反扑...'
      }
    };

    const endings = {
      victory: {
        title: '刀斩夏侯',
        desc: '黄忠居高临下，趁夏侯渊修补鹿角之际，率军冲杀而下！夏侯渊措手不及，被黄忠一刀斩于马下！曹军大乱，汉中遂定。此战后，刘备进位汉中王！',
        historyTitle: '定军山之战的历史意义',
        historyText: '定军山之战是汉中之战的决定性战役。黄忠斩杀夏侯渊，使曹操失去一员大将，汉中尽归刘备。此战后，刘备势力达到顶峰，进位汉中王，与曹操、孙权三分天下。黄忠也因此战功，位列五虎上将之一。'
      },
      defeat: {
        title: '功败垂成',
        desc: '战机稍纵即逝，黄忠未能把握。夏侯渊稳住阵脚，两军陷入僵持...',
        historyTitle: '夏侯渊其人',
        historyText: '夏侯渊是曹操最信任的将领之一，以用兵神速著称，有"虎步关右"之称。然其性格急躁，最终在定军山之战中被黄忠所斩。曹操闻讯大哭："渊本非战将，今果死于此。"'
      }
    };

    let currentPath = '';
    let progress = 0;

    function updateProgress(value) {
      progress = value;
      document.getElementById('progressFill').style.width = value + '%';
    }

    function showChoices() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('choicesPanel').style.display = 'block';
      document.getElementById('choicesPanel').classList.add('fade-in');
      updateProgress(25);
    }

    function selectPath(path) {
      currentPath = path;
      const data = quizData[path];
      
      document.getElementById('choicesPanel').style.display = 'none';
      const quizPanel = document.getElementById('quizPanel');
      quizPanel.style.display = 'block';
      quizPanel.classList.add('active', 'fade-in');

      document.getElementById('quizSpeaker').innerHTML = `
        <img src="${data.speaker.avatar}" alt="${data.speaker.name}" class="speaker-avatar">
        <div class="speaker-info">
          <span class="speaker-name">${data.speaker.name}</span>
          <span class="speaker-title">${data.speaker.title}</span>
        </div>
      `;

      document.getElementById('quizQuestion').innerHTML = `
        <p style="margin-bottom: 1rem; color: var(--text-secondary);">${data.intro}</p>
        <p>${data.question}</p>
      `;

      const optionsHtml = data.options.map((opt, i) => `
        <button class="quiz-option" onclick="checkAnswer(${i}, ${opt.correct})">
          ${String.fromCharCode(65 + i)}. ${opt.text}
        </button>
      `).join('');
      document.getElementById('quizOptions').innerHTML = optionsHtml;

      updateProgress(50);
    }

    function checkAnswer(index, isCorrect) {
      const options = document.querySelectorAll('.quiz-option');
      const data = quizData[currentPath];
      
      options.forEach((opt, i) => {
        opt.classList.add('disabled');
        if (data.options[i].correct) opt.classList.add('correct');
        else if (i === index && !isCorrect) opt.classList.add('wrong');
      });

      updateProgress(75);

      setTimeout(() => {
        const response = isCorrect ? data.correctResponse : data.wrongResponse;
        document.getElementById('quizQuestion').innerHTML += `
          <p style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); color: ${isCorrect ? 'var(--accent-gold)' : 'var(--accent-red)'};">
            ${response}
          </p>
        `;

        document.getElementById('quizOptions').innerHTML += `
          <button class="action-btn primary" style="margin-top: 1.5rem;" onclick="showEnding(${isCorrect})">
            ${isCorrect ? '一刀斩敌' : '鸣金收兵'}
          </button>
        `;
      }, 800);
    }

    function showEnding(isVictory) {
      const ending = isVictory ? endings.victory : endings.defeat;
      
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('quizPanel').style.display = 'none';
      
      const endingPanel = document.getElementById('endingPanel');
      endingPanel.style.display = 'block';
      endingPanel.classList.add('active', 'fade-in');

      document.getElementById('endingTitle').textContent = ending.title;
      document.getElementById('endingTitle').classList.add(isVictory ? 'victory' : 'defeat');
      document.getElementById('endingDesc').textContent = ending.desc;
      document.getElementById('historyTitle').textContent = ending.historyTitle;
      document.getElementById('historyText').textContent = ending.historyText;

      if (isVictory) document.getElementById('victoryOverlay').classList.add('active');

      updateProgress(100);
    }

    function restart() {
      document.getElementById('intro').style.display = 'block';
      document.getElementById('choicesPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('quizPanel').classList.remove('active');
      document.getElementById('endingPanel').style.display = 'none';
      document.getElementById('endingPanel').classList.remove('active');
      document.getElementById('endingTitle').classList.remove('victory', 'defeat');
      document.getElementById('victoryOverlay').classList.remove('active');
      
      currentPath = '';
      updateProgress(0);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
