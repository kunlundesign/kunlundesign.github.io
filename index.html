<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      cursor: crosshair;
    }
    
    .owl-container {
      position: relative;
      margin-bottom: 2rem;
    }
    
    /* 像素猫头鹰 - 用 box-shadow 画像素 */
    .pixel-owl {
      width: 8px;
      height: 8px;
      background: transparent;
      cursor: pointer;
      animation: float 3s ease-in-out infinite;
      /* 每个 box-shadow 是一个像素点，8px 为单位 */
      box-shadow:
        /* 耳朵 - 左 */
        16px 0 0 #5D4037, 24px 0 0 #5D4037,
        8px 8px 0 #5D4037, 16px 8px 0 #8D6E63, 24px 8px 0 #5D4037,
        16px 16px 0 #5D4037,
        /* 耳朵 - 右 */
        72px 0 0 #5D4037, 80px 0 0 #5D4037,
        72px 8px 0 #5D4037, 80px 8px 0 #8D6E63, 88px 8px 0 #5D4037,
        80px 16px 0 #5D4037,
        /* 头顶 */
        32px 8px 0 #6D4C41, 40px 8px 0 #5D4037, 48px 8px 0 #5D4037, 56px 8px 0 #5D4037, 64px 8px 0 #6D4C41,
        24px 16px 0 #6D4C41, 32px 16px 0 #5D4037, 40px 16px 0 #6D4C41, 48px 16px 0 #5D4037, 56px 16px 0 #6D4C41, 64px 16px 0 #5D4037, 72px 16px 0 #6D4C41,
        /* 脸部第一行 */
        16px 24px 0 #5D4037, 24px 24px 0 #6D4C41, 32px 24px 0 #FFECB3, 40px 24px 0 #FFECB3, 48px 24px 0 #FFECB3, 56px 24px 0 #FFECB3, 64px 24px 0 #FFECB3, 72px 24px 0 #6D4C41, 80px 24px 0 #5D4037,
        /* 眼睛那一行 */
        8px 32px 0 #5D4037, 16px 32px 0 #6D4C41, 24px 32px 0 #FFECB3, 32px 32px 0 #3E2723, 40px 32px 0 #FFA000, 48px 32px 0 #FFECB3, 56px 32px 0 #FFA000, 64px 32px 0 #3E2723, 72px 32px 0 #FFECB3, 80px 32px 0 #6D4C41, 88px 32px 0 #5D4037,
        8px 40px 0 #5D4037, 16px 40px 0 #FFECB3, 24px 40px 0 #3E2723, 32px 40px 0 #FFA000, 40px 40px 0 #000, 48px 40px 0 #FFECB3, 56px 40px 0 #000, 64px 40px 0 #FFA000, 72px 40px 0 #3E2723, 80px 40px 0 #FFECB3, 88px 40px 0 #5D4037,
        8px 48px 0 #5D4037, 16px 48px 0 #FFECB3, 24px 48px 0 #3E2723, 32px 48px 0 #FFA000, 40px 48px 0 #FFA000, 48px 48px 0 #FFECB3, 56px 48px 0 #FFA000, 64px 48px 0 #FFA000, 72px 48px 0 #3E2723, 80px 48px 0 #FFECB3, 88px 48px 0 #5D4037,
        /* 嘴巴那一行 */
        8px 56px 0 #6D4C41, 16px 56px 0 #FFECB3, 24px 56px 0 #FFECB3, 32px 56px 0 #3E2723, 40px 56px 0 #FFECB3, 48px 56px 0 #FF8F00, 56px 56px 0 #FFECB3, 64px 56px 0 #3E2723, 72px 56px 0 #FFECB3, 80px 56px 0 #FFECB3, 88px 56px 0 #6D4C41,
        16px 64px 0 #6D4C41, 24px 64px 0 #FFECB3, 32px 64px 0 #FFECB3, 40px 64px 0 #FFECB3, 48px 64px 0 #E65100, 56px 64px 0 #FFECB3, 64px 64px 0 #FFECB3, 72px 64px 0 #FFECB3, 80px 64px 0 #6D4C41,
        /* 身体 */
        16px 72px 0 #5D4037, 24px 72px 0 #6D4C41, 32px 72px 0 #8D6E63, 40px 72px 0 #6D4C41, 48px 72px 0 #8D6E63, 56px 72px 0 #6D4C41, 64px 72px 0 #8D6E63, 72px 72px 0 #6D4C41, 80px 72px 0 #5D4037,
        8px 80px 0 #5D4037, 16px 80px 0 #6D4C41, 24px 80px 0 #D7CCC8, 32px 80px 0 #8D6E63, 40px 80px 0 #D7CCC8, 48px 80px 0 #8D6E63, 56px 80px 0 #D7CCC8, 64px 80px 0 #8D6E63, 72px 80px 0 #D7CCC8, 80px 80px 0 #6D4C41, 88px 80px 0 #5D4037,
        8px 88px 0 #5D4037, 16px 88px 0 #8D6E63, 24px 88px 0 #D7CCC8, 32px 88px 0 #A1887F, 40px 88px 0 #D7CCC8, 48px 88px 0 #A1887F, 56px 88px 0 #D7CCC8, 64px 88px 0 #A1887F, 72px 88px 0 #D7CCC8, 80px 88px 0 #8D6E63, 88px 88px 0 #5D4037,
        8px 96px 0 #6D4C41, 16px 96px 0 #8D6E63, 24px 96px 0 #A1887F, 32px 96px 0 #D7CCC8, 40px 96px 0 #A1887F, 48px 96px 0 #D7CCC8, 56px 96px 0 #A1887F, 64px 96px 0 #D7CCC8, 72px 96px 0 #A1887F, 80px 96px 0 #8D6E63, 88px 96px 0 #6D4C41,
        16px 104px 0 #6D4C41, 24px 104px 0 #8D6E63, 32px 104px 0 #A1887F, 40px 104px 0 #8D6E63, 48px 104px 0 #A1887F, 56px 104px 0 #8D6E63, 64px 104px 0 #A1887F, 72px 104px 0 #8D6E63, 80px 104px 0 #6D4C41,
        24px 112px 0 #5D4037, 32px 112px 0 #6D4C41, 40px 112px 0 #6D4C41, 48px 112px 0 #5D4037, 56px 112px 0 #6D4C41, 64px 112px 0 #6D4C41, 72px 112px 0 #5D4037,
        /* 脚 */
        24px 120px 0 #FF8F00, 32px 120px 0 #FF8F00, 40px 120px 0 #FF8F00, 56px 120px 0 #FF8F00, 64px 120px 0 #FF8F00, 72px 120px 0 #FF8F00,
        24px 128px 0 #E65100, 40px 128px 0 #E65100, 56px 128px 0 #E65100, 72px 128px 0 #E65100;
      transform: scale(1.5);
    }
    
    @keyframes float {
      0%, 100% { transform: scale(1.5) translateY(0); }
      50% { transform: scale(1.5) translateY(-6px); }
    }
    
    .pixel-owl:hover { filter: brightness(1.15); }
    .pixel-owl:active { transform: scale(1.4); }
    
    /* 抖动 */
    @keyframes shake {
      0%, 100% { transform: scale(1.5) rotate(0); }
      25% { transform: scale(1.5) rotate(-8deg); }
      75% { transform: scale(1.5) rotate(8deg); }
    }
    .pixel-owl.angry { animation: shake 0.2s ease-in-out 2; }
    
    /* 眨眼层 - 覆盖眼睛 */
    .blink-overlay {
      position: absolute;
      top: 60px; /* 调整到眼睛位置 */
      left: 57px;
      width: 80px;
      height: 12px;
      display: flex;
      gap: 24px;
      pointer-events: none;
      opacity: 0;
    }
    .blink-overlay div {
      width: 28px;
      height: 12px;
      background: #3E2723;
    }
    @keyframes blink {
      0%, 95%, 100% { opacity: 0; }
      97% { opacity: 1; }
    }
    .blink-overlay { animation: blink 4s infinite; }
    
    /* 对话气泡 */
    .speech-bubble {
      position: absolute;
      bottom: calc(100% + 20px);
      left: 50%;
      transform: translateX(-50%);
      background: #0d1117;
      color: #FFA000;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.02em;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      border: 2px solid #FFA000;
      text-shadow: 0 0 10px rgba(255,160,0,0.5);
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: #FFA000;
    }
    .speech-bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-5px);
    }
    
    /* 文字 */
    .text {
      text-align: center;
      margin-top: 1rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.4em;
      color: #FFA000;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(255,160,0,0.3);
    }
    p {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #666;
    }
    
    /* 星星 */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .star {
      position: absolute;
      background: #fff;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="owl-container">
    <div class="speech-bubble" id="speech"></div>
    <div class="pixel-owl" id="owl"></div>
    <div class="blink-overlay"><div></div><div></div></div>
  </div>
  
  <div class="text">
    <h1 id="title">HOOT HOOT</h1>
    <p id="subtitle">click the owl</p>
  </div>

  <script>
    // 星星
    const stars = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
      star.style.animationDelay = Math.random() * 2 + 's';
      stars.appendChild(star);
    }
    
    // 点击交互
    const owl = document.getElementById('owl');
    const speech = document.getElementById('speech');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    let clicks = 0;
    
    const responses = [
      { text: '📧 liukunlun@outlook.com', title: 'HOOT!', sub: 'here\'s my email' },
      { text: 'You\'re welcome!', title: '🦉', sub: 'anything else?' },
      { text: 'Still here?', title: 'HOOT?', sub: 'okay then...' },
      { text: 'Stop poking me!', title: '😤', sub: 'getting annoyed' },
      { text: 'I SAID STOP!', title: '💢', sub: 'final warning!' },
      { text: '...fine. whatever.', title: '😒', sub: 'stubborn human' },
      { text: 'You\'re weird.', title: '🙄', sub: 'just saying' },
      { text: '*angry owl noises*', title: '🔥', sub: 'HOOT HOOT HOOT' },
      { text: 'GO. AWAY.', title: '💀', sub: 'I mean it!' },
      { text: '...we\'re friends now I guess', title: '🤝', sub: 'you earned it' },
    ];
    
    const angry = [
      '别点了！', 'STOP IT!', '烦死了！', 'Leave me alone!', 
      '再点就报警', 'I will bite', '你有病？', 'Touch grass',
      '闲得慌？', 'Get a life!', '下班了！', '*screams*',
      '救命', 'Why tho', '放过我', 'I\'m just an owl',
      '你赢了', 'U win', '无语', 'Bruh'
    ];
    
    owl.onclick = () => {
      clicks++;
      if (clicks <= responses.length) {
        const r = responses[clicks - 1];
        speech.textContent = r.text;
        title.textContent = r.title;
        subtitle.textContent = r.sub;
      } else {
        speech.textContent = angry[Math.floor(Math.random() * angry.length)];
        title.textContent = ['💢','😡','🤬','💀','😫'][Math.floor(Math.random()*5)];
        subtitle.textContent = `#${clicks} ...seriously?`;
        owl.classList.add('angry');
        setTimeout(() => owl.classList.remove('angry'), 400);
      }
      speech.classList.add('show');
      setTimeout(() => speech.classList.remove('show'), 2500);
    };
  </script>
</body>
</html>
