<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      cursor: crosshair;
    }
    
    .owl-container {
      position: relative;
      width: 180px;
      height: 240px;
      margin-bottom: 1rem;
    }
    
    /* 像素猫头鹰 - 参考图重绘 */
    .pixel-owl {
      position: absolute;
      top: 10px;
      left: 0;
      width: 6px;
      height: 6px;
      background: transparent;
      animation: float 3s ease-in-out infinite;
      image-rendering: pixelated;
      pointer-events: none;
      /* 6px 单位像素网格 */
      box-shadow:
        /* 耳朵左 */
        18px 0 0 #5D4037, 24px 0 0 #3E2723,
        12px 6px 0 #5D4037, 18px 6px 0 #6D4C41, 24px 6px 0 #3E2723, 30px 6px 0 #5D4037,
        18px 12px 0 #5D4037, 24px 12px 0 #5D4037,
        /* 耳朵右 */
        60px 0 0 #3E2723, 66px 0 0 #5D4037,
        54px 6px 0 #5D4037, 60px 6px 0 #3E2723, 66px 6px 0 #6D4C41, 72px 6px 0 #5D4037,
        60px 12px 0 #5D4037, 66px 12px 0 #5D4037,
        /* 头顶 */
        30px 6px 0 #5D4037, 36px 6px 0 #6D4C41, 42px 6px 0 #5D4037, 48px 6px 0 #6D4C41, 54px 6px 0 #5D4037,
        24px 12px 0 #6D4C41, 30px 12px 0 #5D4037, 36px 12px 0 #3E2723, 42px 12px 0 #5D4037, 48px 12px 0 #3E2723, 54px 12px 0 #5D4037, 60px 12px 0 #6D4C41,
        /* 脸 - 第一行 */
        18px 18px 0 #5D4037, 24px 18px 0 #6D4C41, 30px 18px 0 #FFF8E1, 36px 18px 0 #FFF8E1, 42px 18px 0 #FFF8E1, 48px 18px 0 #FFF8E1, 54px 18px 0 #FFF8E1, 60px 18px 0 #6D4C41, 66px 18px 0 #5D4037,
        /* 眼睛行上 */
        12px 24px 0 #5D4037, 18px 24px 0 #8D6E63, 24px 24px 0 #FFF8E1, 30px 24px 0 #3E2723, 36px 24px 0 #FFB74D, 42px 24px 0 #FFF8E1, 48px 24px 0 #FFB74D, 54px 24px 0 #3E2723, 60px 24px 0 #FFF8E1, 66px 24px 0 #8D6E63, 72px 24px 0 #5D4037,
        /* 眼睛行中 - 瞳孔 */
        12px 30px 0 #6D4C41, 18px 30px 0 #FFF8E1, 24px 30px 0 #3E2723, 30px 30px 0 #FFB74D, 36px 30px 0 #1a1a1a, 42px 30px 0 #FFF8E1, 48px 30px 0 #1a1a1a, 54px 30px 0 #FFB74D, 60px 30px 0 #3E2723, 66px 30px 0 #FFF8E1, 72px 30px 0 #6D4C41,
        /* 眼睛行下 */
        12px 36px 0 #6D4C41, 18px 36px 0 #FFF8E1, 24px 36px 0 #3E2723, 30px 36px 0 #FFB74D, 36px 36px 0 #FFB74D, 42px 36px 0 #FFF8E1, 48px 36px 0 #FFB74D, 54px 36px 0 #FFB74D, 60px 36px 0 #3E2723, 66px 36px 0 #FFF8E1, 72px 36px 0 #6D4C41,
        /* 嘴上 */
        12px 42px 0 #8D6E63, 18px 42px 0 #FFF8E1, 24px 42px 0 #FFF8E1, 30px 42px 0 #3E2723, 36px 42px 0 #FFF8E1, 42px 42px 0 #FF8F00, 48px 42px 0 #FFF8E1, 54px 42px 0 #3E2723, 60px 42px 0 #FFF8E1, 66px 42px 0 #FFF8E1, 72px 42px 0 #8D6E63,
        /* 嘴下 */
        18px 48px 0 #8D6E63, 24px 48px 0 #FFF8E1, 30px 48px 0 #FFF8E1, 36px 48px 0 #FFF8E1, 42px 48px 0 #E65100, 48px 48px 0 #FFF8E1, 54px 48px 0 #FFF8E1, 60px 48px 0 #FFF8E1, 66px 48px 0 #8D6E63,
        /* 身体上 - 翅膀开始 */
        6px 54px 0 #6D4C41, 12px 54px 0 #8D6E63, 18px 54px 0 #6D4C41, 24px 54px 0 #8D6E63, 30px 54px 0 #BCAAA4, 36px 54px 0 #8D6E63, 42px 54px 0 #BCAAA4, 48px 54px 0 #8D6E63, 54px 54px 0 #BCAAA4, 60px 54px 0 #8D6E63, 66px 54px 0 #6D4C41, 72px 54px 0 #8D6E63, 78px 54px 0 #6D4C41,
        /* 身体 - 翅膀 */
        6px 60px 0 #8D6E63, 12px 60px 0 #A1887F, 18px 60px 0 #8D6E63, 24px 60px 0 #BCAAA4, 30px 60px 0 #D7CCC8, 36px 60px 0 #BCAAA4, 42px 60px 0 #D7CCC8, 48px 60px 0 #BCAAA4, 54px 60px 0 #D7CCC8, 60px 60px 0 #BCAAA4, 66px 60px 0 #8D6E63, 72px 60px 0 #A1887F, 78px 60px 0 #8D6E63,
        6px 66px 0 #6D4C41, 12px 66px 0 #8D6E63, 18px 66px 0 #A1887F, 24px 66px 0 #BCAAA4, 30px 66px 0 #D7CCC8, 36px 66px 0 #EFEBE9, 42px 66px 0 #D7CCC8, 48px 66px 0 #EFEBE9, 54px 66px 0 #D7CCC8, 60px 66px 0 #BCAAA4, 66px 66px 0 #A1887F, 72px 66px 0 #8D6E63, 78px 66px 0 #6D4C41,
        12px 72px 0 #6D4C41, 18px 72px 0 #8D6E63, 24px 72px 0 #A1887F, 30px 72px 0 #BCAAA4, 36px 72px 0 #D7CCC8, 42px 72px 0 #BCAAA4, 48px 72px 0 #D7CCC8, 54px 72px 0 #BCAAA4, 60px 72px 0 #A1887F, 66px 72px 0 #8D6E63, 72px 72px 0 #6D4C41,
        18px 78px 0 #5D4037, 24px 78px 0 #6D4C41, 30px 78px 0 #8D6E63, 36px 78px 0 #A1887F, 42px 78px 0 #8D6E63, 48px 78px 0 #A1887F, 54px 78px 0 #8D6E63, 60px 78px 0 #6D4C41, 66px 78px 0 #5D4037,
        24px 84px 0 #5D4037, 30px 84px 0 #6D4C41, 36px 84px 0 #6D4C41, 42px 84px 0 #5D4037, 48px 84px 0 #6D4C41, 54px 84px 0 #6D4C41, 60px 84px 0 #5D4037,
        /* 脚 */
        24px 90px 0 #FF8F00, 30px 90px 0 #FF8F00, 36px 90px 0 #FF8F00, 48px 90px 0 #FF8F00, 54px 90px 0 #FF8F00, 60px 90px 0 #FF8F00,
        24px 96px 0 #E65100, 36px 96px 0 #E65100, 48px 96px 0 #E65100, 60px 96px 0 #E65100,
        /* 站立台 */
        18px 102px 0 #78909C, 24px 102px 0 #90A4AE, 30px 102px 0 #B0BEC5, 36px 102px 0 #90A4AE, 42px 102px 0 #B0BEC5, 48px 102px 0 #90A4AE, 54px 102px 0 #B0BEC5, 60px 102px 0 #90A4AE, 66px 102px 0 #78909C;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    
    .owl-container:hover .pixel-owl { filter: brightness(1.15); }
    
    @keyframes shake {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }
    .pixel-owl.angry { animation: shake 0.2s ease-in-out 2; }
    
    /* 点击区域 */
    .owl-hitbox {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 10;
    }
    
    /* 对话气泡 */
    .speech-bubble {
      position: absolute;
      bottom: calc(100% + 30px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: #FFB74D;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      border: 2px solid #FFB74D;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: #FFB74D;
    }
    .speech-bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-5px);
    }
    
    /* 文字 */
    .text {
      text-align: center;
      margin-top: 2.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 0.5em;
      color: #FFB74D;
      margin-bottom: 0.8rem;
      text-shadow: 0 0 30px rgba(255,183,77,0.3);
    }
    p {
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #aaa;
    }
    
    /* 星星 */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="owl-container" id="owlContainer">
    <div class="speech-bubble" id="speech"></div>
    <div class="pixel-owl" id="owl"></div>
    <div class="owl-hitbox" id="owlHitbox"></div>
  </div>
  
  <div class="text">
    <h1 id="title">HOOT HOOT</h1>
    <p id="subtitle">click the owl</p>
  </div>

  <script>
    // 星星
    const stars = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
      star.style.animationDelay = Math.random() * 2 + 's';
      stars.appendChild(star);
    }
    
    // 点击
    const owl = document.getElementById('owl');
    const speech = document.getElementById('speech');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const hitbox = document.getElementById('owlHitbox');
    let clicks = 0;
    
    const responses = [
      { text: '📧 liukunlun@outlook.com', title: 'HOOT!', sub: 'here\'s my email' },
      { text: 'You\'re welcome!', title: '🦉', sub: 'anything else?' },
      { text: 'Still here?', title: 'HOOT?', sub: 'okay...' },
      { text: 'Stop poking me!', title: '😤', sub: 'getting annoyed' },
      { text: 'I SAID STOP!', title: '💢', sub: 'final warning!' },
      { text: '...fine.', title: '😒', sub: 'stubborn human' },
      { text: 'You\'re weird.', title: '🙄', sub: 'just saying' },
      { text: '*angry owl noises*', title: '🔥', sub: 'HOOT HOOT' },
      { text: 'GO AWAY', title: '💀', sub: 'I mean it!' },
      { text: '...friends now', title: '🤝', sub: 'you earned it' },
    ];
    
    const angry = ['别点了！','STOP!','烦死了！','Leave me alone!','再点报警','I\'ll bite','有病？','Touch grass','闲的？','Get a life!','下班了','*screams*','救命','Why','放过我','Just an owl','你赢了','U win','无语','Bruh'];
    
    hitbox.onclick = () => {
      clicks++;
      if (clicks <= responses.length) {
        const r = responses[clicks - 1];
        speech.textContent = r.text;
        title.textContent = r.title;
        subtitle.textContent = r.sub;
      } else {
        speech.textContent = angry[Math.floor(Math.random() * angry.length)];
        title.textContent = ['💢','😡','🤬','💀','😫'][Math.floor(Math.random()*5)];
        subtitle.textContent = `#${clicks} ...why?`;
        owl.classList.add('angry');
        setTimeout(() => owl.classList.remove('angry'), 400);
      }
      speech.classList.add('show');
      setTimeout(() => speech.classList.remove('show'), 2500);
    };
  </script>
</body>
</html>
