<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      color: #888;
      overflow: hidden;
      cursor: crosshair;
    }
    
    .owl-container {
      position: relative;
      margin-bottom: 2rem;
    }
    
    /* 像素风猫头鹰 */
    .owl {
      width: 120px;
      height: 140px;
      position: relative;
      image-rendering: pixelated;
    }
    
    /* 猫头鹰身体 - 用 CSS 画像素风 */
    .owl-body {
      position: absolute;
      width: 100px;
      height: 90px;
      left: 10px;
      top: 50px;
      background: #5c4a3d;
      border-radius: 0 0 40px 40px;
      box-shadow: 
        inset -10px 0 0 #4a3c32,
        inset 10px 0 0 #6b5847;
    }
    
    /* 肚子花纹 */
    .owl-body::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 50px;
      left: 20px;
      top: 20px;
      background: repeating-linear-gradient(
        0deg,
        #8b7355 0px, #8b7355 6px,
        #5c4a3d 6px, #5c4a3d 12px
      );
      border-radius: 0 0 30px 30px;
    }
    
    /* 头部 */
    .owl-head {
      position: absolute;
      width: 100px;
      height: 70px;
      left: 10px;
      top: 10px;
      background: #5c4a3d;
      border-radius: 50px 50px 30px 30px;
    }
    
    /* 耳朵 */
    .ear {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 25px solid #5c4a3d;
      top: -5px;
    }
    .ear.left { left: 5px; transform: rotate(-15deg); }
    .ear.right { right: 5px; transform: rotate(15deg); }
    
    /* 眼眶 */
    .eye-socket {
      position: absolute;
      width: 38px;
      height: 38px;
      background: #1a1a1a;
      border-radius: 50%;
      top: 20px;
      border: 4px solid #8b7355;
    }
    .eye-socket.left { left: 8px; }
    .eye-socket.right { right: 8px; }
    
    /* 眼球 */
    .eye {
      position: absolute;
      width: 26px;
      height: 26px;
      background: #ffd93d;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease-out;
    }
    
    /* 瞳孔 */
    .pupil {
      position: absolute;
      width: 12px;
      height: 14px;
      background: #0a0a0a;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    /* 高光 */
    .eye::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      top: 4px;
      right: 4px;
    }
    
    /* 嘴巴 */
    .beak {
      position: absolute;
      left: 50%;
      top: 55px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 15px solid #d4a84b;
    }
    
    /* 脚 */
    .feet {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }
    .foot {
      width: 20px;
      height: 10px;
      background: #d4a84b;
      border-radius: 0 0 10px 10px;
      position: relative;
    }
    .foot::before, .foot::after, .foot span {
      content: '';
      position: absolute;
      bottom: 0;
      width: 6px;
      height: 12px;
      background: #d4a84b;
      border-radius: 0 0 3px 3px;
    }
    .foot::before { left: 1px; }
    .foot::after { right: 1px; }
    .foot span { left: 50%; transform: translateX(-50%); }
    
    /* 眨眼动画 */
    @keyframes blink {
      0%, 90%, 100% { transform: translate(-50%, -50%) scaleY(1); }
      95% { transform: translate(-50%, -50%) scaleY(0.1); }
    }
    
    .eye {
      animation: blink 4s ease-in-out infinite;
    }
    
    /* 身体微微晃动 */
    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }
    
    .owl {
      animation: sway 3s ease-in-out infinite;
    }
    
    /* 文字 */
    .text {
      text-align: center;
      opacity: 0.6;
    }
    h1 {
      font-size: 0.9rem;
      font-weight: normal;
      letter-spacing: 0.3em;
      color: #666;
      margin-bottom: 0.5rem;
      transition: all 0.3s;
    }
    p {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #444;
    }
    
    /* 对话气泡 */
    .speech-bubble {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #ffd93d;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      margin-bottom: 10px;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: #222;
    }
    .speech-bubble.show {
      opacity: 1;
    }
    
    /* 猫头鹰可点击 */
    .owl {
      cursor: pointer;
      animation: sway 3s ease-in-out infinite;
    }
    .owl:hover {
      filter: brightness(1.1);
    }
    .owl:active {
      transform: scale(0.95);
    }
    
    /* 抖动动画 */
    @keyframes shake {
      0%, 100% { transform: rotate(-1deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    .owl.angry {
      animation: shake 0.3s ease-in-out;
    }
    
    /* 星星背景 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      opacity: 0.3;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="owl-container">
    <div class="speech-bubble" id="speech"></div>
    <div class="owl" id="owl">
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="owl-head">
        <div class="eye-socket left">
          <div class="eye" id="eyeLeft">
            <div class="pupil"></div>
          </div>
        </div>
        <div class="eye-socket right">
          <div class="eye" id="eyeRight">
            <div class="pupil"></div>
          </div>
        </div>
        <div class="beak"></div>
      </div>
      <div class="owl-body"></div>
      <div class="feet">
        <div class="foot"><span></span></div>
        <div class="foot"><span></span></div>
      </div>
    </div>
  </div>
  
  <div class="text">
    <h1 id="title">HOOT HOOT</h1>
    <p id="subtitle">click the owl</p>
  </div>

  <script>
    // 生成星星
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 2 + 's';
      starsContainer.appendChild(star);
    }
    
    // 眼球跟踪鼠标
    const eyeLeft = document.getElementById('eyeLeft');
    const eyeRight = document.getElementById('eyeRight');
    
    document.addEventListener('mousemove', (e) => {
      const eyes = [eyeLeft, eyeRight];
      
      eyes.forEach(eye => {
        const rect = eye.parentElement.getBoundingClientRect();
        const eyeCenterX = rect.left + rect.width / 2;
        const eyeCenterY = rect.top + rect.height / 2;
        
        const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);
        const distance = Math.min(6, Math.hypot(e.clientX - eyeCenterX, e.clientY - eyeCenterY) / 30);
        
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        
        eye.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
      });
    });
    
    // 移动端支持
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      document.dispatchEvent(mouseEvent);
    });
    
    // 点击交互
    const owl = document.getElementById('owl');
    const speech = document.getElementById('speech');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    let clickCount = 0;
    
    const responses = [
      { text: '📧 liukunlun@outlook.com', title: 'HOOT!', sub: 'here\'s my email' },
      { text: 'You\'re welcome!', title: '🦉', sub: 'anything else?' },
      { text: 'Okay okay...', title: 'HOOT?', sub: 'still here?' },
      { text: 'Stop poking me!', title: '😤', sub: 'getting annoyed...' },
      { text: 'I said STOP!', title: 'ANGRY OWL', sub: 'last warning!' },
      { text: '...fine. I\'ll allow it.', title: '😒', sub: 'persistent human' },
      { text: 'You\'re weird.', title: '🙄', sub: 'but okay' },
      { text: '*angry owl noises*', title: '🔥', sub: 'HOOT HOOT HOOT' },
      { text: 'GO AWAY', title: '💢', sub: 'I mean it!' },
      { text: '...I respect your dedication', title: '🤝', sub: 'we\'re friends now' },
    ];
    
    const angryResponses = [
      '别点了！', 'STOP IT!', '烦死了！', 'Leave me alone!', 
      '再点我就报警了', 'I\'m calling the police', '你有病吧', 'Touch grass please',
      '闲的没事干？', 'Get a hobby!', '我要下班了', '*screams in owl*'
    ];
    
    owl.addEventListener('click', () => {
      clickCount++;
      
      let response;
      if (clickCount <= responses.length) {
        response = responses[clickCount - 1];
        speech.textContent = response.text;
        title.textContent = response.title;
        subtitle.textContent = response.sub;
      } else {
        // 超过预设次数后随机骂人
        const angry = angryResponses[Math.floor(Math.random() * angryResponses.length)];
        speech.textContent = angry;
        title.textContent = ['💢', '😡', '🤬', '💀'][Math.floor(Math.random() * 4)];
        subtitle.textContent = `click #${clickCount}... seriously?`;
        
        // 抖动效果
        owl.classList.add('angry');
        setTimeout(() => owl.classList.remove('angry'), 300);
      }
      
      // 显示气泡
      speech.classList.add('show');
      setTimeout(() => speech.classList.remove('show'), 2500);
    });
  </script>
</body>
</html>
