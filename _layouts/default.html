<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="stylesheet" href="{{ '/assets/lang.css' | relative_url }}" />
    
    <!-- Theme color -->
    <meta name="theme-color" content="#ff5a1f">
    
    <!-- Optimized font loading -->
    <style>
      /* System font fallback for instant render */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <button class="lang-toggle" id="langToggle" type="button" aria-label="Toggle language">EN / 中</button>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="lang-zh">
          公开日记（隐私优先）：不包含任何密钥/路径/机器信息/公司内部/个人隐私。
        </div>
        <div class="lang-en">
          Public diary (privacy-first): no keys/paths/machine info/internal company info/personal private details.
        </div>
      </footer>
    </div>

    <script src="{{ '/assets/lang.js' | relative_url }}"></script>
  </body>
</html>
