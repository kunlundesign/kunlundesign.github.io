<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诸葛亮传 · 交互叙事</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0b09;
      --bg-secondary: #1a1612;
      --bg-card: #241f1a;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --text-dim: #5a5045;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --accent-orange: #d4854a;
      --border: rgba(201, 165, 92, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ==================== 全屏场景系统 ==================== */
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 背景层 */
    .scene-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 1.5s ease, transform 8s ease;
      transform: scale(1.05);
    }

    .scene-bg.active {
      transform: scale(1);
    }

    .scene-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13, 11, 9, 0.3) 0%,
        rgba(13, 11, 9, 0.5) 50%,
        rgba(13, 11, 9, 0.95) 100%
      );
    }

    /* 环境粒子效果 */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* 雪花效果 */
    .snow .particle {
      background: rgba(255, 255, 255, 0.8);
      width: 4px;
      height: 4px;
      filter: blur(1px);
    }

    /* 火星效果 */
    .fire .particle {
      background: var(--accent-orange);
      width: 3px;
      height: 3px;
      filter: blur(1px);
      animation-name: floatUp;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 1; }
      100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
    }

    /* 萤火虫效果 */
    .firefly .particle {
      background: #ffd700;
      width: 4px;
      height: 4px;
      filter: blur(2px);
      animation: fireflyFloat 8s ease-in-out infinite;
    }

    @keyframes fireflyFloat {
      0%, 100% { transform: translate(0, 0); opacity: 0.3; }
      25% { transform: translate(30px, -20px); opacity: 1; }
      50% { transform: translate(-20px, -40px); opacity: 0.5; }
      75% { transform: translate(10px, -10px); opacity: 1; }
    }

    /* ==================== 内容层 ==================== */
    .content-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      z-index: 10;
    }

    /* 顶部信息栏 */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.5rem 2rem;
      background: linear-gradient(to bottom, rgba(13,11,9,0.8) 0%, transparent 100%);
    }

    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .back-btn:hover {
      opacity: 1;
      color: var(--accent-gold);
    }

    .chapter-info {
      text-align: right;
    }

    .chapter-num {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }

    .chapter-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.3rem;
      color: var(--accent-gold);
    }

    /* 人物状态条 */
    .character-status {
      position: absolute;
      top: 50%;
      left: 2rem;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .status-icon {
      width: 20px;
      text-align: center;
    }

    .status-bar {
      width: 60px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .status-fill {
      height: 100%;
      transition: width 0.5s ease;
    }

    .status-fill.reputation { background: var(--accent-gold); }
    .status-fill.military { background: var(--accent-red); }
    .status-fill.wisdom { background: var(--accent-blue); }

    /* 年龄/时间线指示器 */
    .timeline {
      position: absolute;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .timeline-year {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.5rem;
      color: var(--accent-gold);
      line-height: 1;
    }

    .timeline-age {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .timeline-era {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ==================== 叙事文本区 ==================== */
    .narrative-panel {
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }

    .scene-location {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .narrative-text {
      font-size: 1.15rem;
      line-height: 2;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }

    .narrative-text .highlight {
      color: var(--accent-gold);
    }

    .narrative-text .dim {
      color: var(--text-secondary);
    }

    /* 对话气泡 */
    .dialogue-bubble {
      background: rgba(26, 22, 18, 0.9);
      border-left: 3px solid var(--accent-gold);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      backdrop-filter: blur(10px);
    }

    .dialogue-speaker {
      font-size: 0.8rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    .dialogue-speaker.liu { color: var(--accent-green); }
    .dialogue-speaker.cao { color: var(--accent-blue); }
    .dialogue-speaker.zhou { color: var(--accent-red); }
    .dialogue-speaker.sima { color: #9370db; }

    .dialogue-text {
      font-size: 1.05rem;
      line-height: 1.8;
      font-style: italic;
    }

    /* 内心独白 */
    .inner-thought {
      background: linear-gradient(90deg, rgba(74, 107, 138, 0.2) 0%, transparent 100%);
      border-left: 2px solid var(--accent-blue);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .thought-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent-blue);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    /* ==================== 选项系统 ==================== */
    .choices-container {
      margin-top: 2rem;
    }

    .choices-prompt {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      background: rgba(26, 22, 18, 0.8);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 3px;
      height: 100%;
      background: var(--accent-gold);
      transform: scaleY(0);
      transition: transform 0.3s ease;
    }

    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
      transform: translateX(8px);
    }

    .choice-btn:hover::before {
      transform: scaleY(1);
    }

    .choice-text {
      display: block;
      margin-bottom: 0.25rem;
    }

    .choice-subtext {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .choice-effect {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: var(--accent-gold);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .choice-btn:hover .choice-effect {
      opacity: 1;
    }

    /* 选中/淡出效果 */
    .choice-btn.selected {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.15);
    }

    .choice-btn.faded {
      opacity: 0.3;
      transform: translateX(0);
      pointer-events: none;
    }

    /* ==================== 继续按钮 ==================== */
    .continue-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .continue-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    .continue-btn .arrow {
      transition: transform 0.3s;
    }

    .continue-btn:hover .arrow {
      transform: translateX(4px);
    }

    /* ==================== 场景过渡 ==================== */
    .scene-transition {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .scene-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    .transition-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem;
      color: var(--accent-gold);
      margin-bottom: 1rem;
    }

    .transition-subtext {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* ==================== 结局画面 ==================== */
    .ending-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .ending-screen.active {
      display: flex;
    }

    .ending-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }

    .ending-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .ending-epitaph {
      max-width: 600px;
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text-primary);
      margin-bottom: 3rem;
      padding: 2rem;
      border: 1px solid var(--border);
      background: rgba(26, 22, 18, 0.5);
    }

    .ending-stats {
      display: flex;
      gap: 3rem;
      margin-bottom: 2rem;
    }

    .ending-stat {
      text-align: center;
    }

    .ending-stat-value {
      font-size: 2rem;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .ending-stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    .ending-actions {
      display: flex;
      gap: 1rem;
    }

    .ending-btn {
      padding: 1rem 2rem;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .ending-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    .ending-btn.primary {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    /* ==================== 进度指示 ==================== */
    .progress-dots {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .progress-dot.active {
      background: var(--accent-gold);
    }

    .progress-dot.completed {
      background: var(--text-dim);
    }

    /* ==================== 音效提示（视觉） ==================== */
    .audio-hint {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.3s;
    }

    .audio-hint:hover {
      color: var(--text-secondary);
    }

    /* ==================== 隐藏场景 ==================== */
    .scene {
      display: none;
    }

    .scene.active {
      display: block;
    }

    /* ==================== 动画 ==================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeInUp 0.8s ease forwards;
    }

    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }

    /* ==================== 响应式 ==================== */
    @media (max-width: 768px) {
      .character-status,
      .timeline {
        display: none;
      }

      .content-layer {
        padding: 1rem;
      }

      .narrative-text {
        font-size: 1rem;
      }

      .top-bar {
        padding: 1rem;
      }

      .chapter-title {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
    </div>
  </div>

  <!-- 结局画面 -->
  <div class="ending-screen" id="endingScreen">
    <div class="ending-title" id="endingTitle">星落秋风五丈原</div>
    <div class="ending-subtitle" id="endingSubtitle">诸葛亮 · 181-234</div>

      <a href="../sanguozhi/" class="ending-btn">返回三国志</a>
      <button onclick="restart()" class="ending-btn">重历一生</button>

  </div>

    function createParticles(type) {
      const container = document.getElementById('particles');
      container.innerHTML = '';
      container.className = 'particles ' + type;
      
      if (type === 'none') return;
      
      const count = type === 'snow' ? 50 : type === 'fire' ? 30 : 20;
      
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (5 + Math.random() * 10) + 's';
        particle.style.animationDelay = Math.random() * 5 + 's';
        if (type === 'firefly') {
          particle.style.left = (10 + Math.random() * 80) + '%';
          particle.style.top = (20 + Math.random() * 60) + '%';
        }
        container.appendChild(particle);
      }
    }

    // ==================== 场景渲染 ====================
    function renderScene() {
      const chapter = chapters[state.chapter - 1];
      const scene = chapter.scenes[state.scene];
      
      // 更新背景
      const bg = document.getElementById('sceneBg');
      bg.style.backgroundImage = `url('${chapter.bg}')`;
      bg.style.filter = chapter.bgFilter;
      setTimeout(() => bg.classList.add('active'), 100);
      
      // 更新粒子
      createParticles(chapter.particles);
      
      // 更新章节信息
      document.getElementById('chapterTitle').textContent = chapter.title;
      document.getElementById('timelineYear').textContent = chapter.year;
      document.getElementById('timelineAge').textContent = `${chapter.age}岁`;
      
      // 更新进度点
      updateProgressDots();
      
      // 渲染内容
      const panel = document.getElementById('narrativePanel');
      
      let html = '';
      if (scene.location) {
        html += `<div class="scene-location fade-in">${scene.location}</div>`;
      }
      
      html += `<div class="narrative-text">${scene.content}</div>`;
      
      // 处理动态内容
      if (scene.dynamicContent) {
        setTimeout(() => applyDynamicContent(), 100);
      }
      
      // 选项或继续按钮
      if (scene.choices) {
        html += `<div class="choices-container fade-in delay-4">`;
        html += `<div class="choices-prompt">你的选择</div>`;
        scene.choices.forEach((choice, i) => {
          html += `
            <button class="choice-btn" onclick="makeChoice(${i})">
              <span class="choice-text">${choice.text}</span>
              <span class="choice-subtext">${choice.subtext}</span>
              <span class="choice-effect">${choice.effect}</span>
            </button>
          `;
        });
        html += `</div>`;
      } else if (scene.continue && !scene.ending) {
        html += `
          <button class="continue-btn fade-in delay-4" onclick="nextScene()">
            继续 <span class="arrow">→</span>
          </button>
        `;
      }
      
      panel.innerHTML = html;
      
      // 处理结局
      if (scene.ending) {
        setTimeout(() => showEnding(), 500);
      }
    }

    // ==================== 动态内容填充 ====================
    function applyDynamicContent() {
      const chapter = chapters[state.chapter - 1];
      const scene = chapter.scenes[state.scene];
      
      // 第一章场景3的动态内容
      if (state.chapter === 1 && state.scene === 3) {
        const textEl = document.getElementById('scene-1-3-text');
        const dialogueEl = document.getElementById('scene-1-3-dialogue');
        const responseEl = document.getElementById('scene-1-3-response');
        
        if (state.flags.full_plan) {
          textEl.textContent = '你起身走到墙边，拉开帘布，露出一幅亲手绘制的天下舆图。';
          dialogueEl.textContent = '自董卓以来，豪杰并起。曹操拥百万之众，挟天子以令诸侯，此诚不可与争锋。孙权据江东，已历三世，可用为援而不可图。将军若跨有荆、益，西和诸戎，南抚夷越，外结好孙权，内修政理……霸业可成，汉室可兴矣。';
          responseEl.innerHTML = '刘备听完，<span class="highlight">霍然起身</span>，深深一揖："先生之言，使备茅塞顿开！"';
        } else if (state.flags.test_first) {
          textEl.textContent = '你没有急于表态，而是反问：';
          dialogueEl.textContent = '将军以为，当今天下，何人可与曹操争锋？';
          responseEl.innerHTML = '刘备沉吟片刻，答道："唯有孙权。"你微微点头——<span class="highlight">这个人，有眼光</span>。';
        } else if (state.flags.hesitate) {
          textEl.textContent = '你摇了摇头：';
          dialogueEl.textContent = '出山之事，容亮再思量几日。';
          responseEl.innerHTML = '刘备的眼中闪过一丝失望，但随即恢复平静。他站起身，说："先生若有决断，备随时恭候。"<span class="dim">他的诚意，让你有些动摇。</span>';
        }
      }
      
      // 第三章场景2的动态内容
      if (state.chapter === 3 && state.scene === 2) {
        const textEl = document.getElementById('scene-3-2-text');
        if (state.flags.loyal_path) {
          textEl.textContent = '你的泪水打湿了榻前的席子。刘备似乎放下了心，缓缓闭上眼睛。';
        } else if (state.flags.pragmatic_path) {
          textEl.textContent = '刘备看着你的眼睛，良久，他笑了："孔明，朕信你。"';
        }
      }
      
      // 第四章场景3的动态内容
      if (state.chapter === 4 && state.scene === 3) {
        const textEl = document.getElementById('scene-4-3-text');
        if (state.flags.kill_masu) {
          textEl.innerHTML = '马谡伏诛那天，你独自在帐中坐到天明。<span class="dim">他曾是你最看好的年轻人。</span>';
        } else if (state.flags.spare_masu) {
          textEl.innerHTML = '你网开一面，但军中议论纷纷。<span class="dim">有人说丞相徇私，有人说丞相仁厚。你不在乎——你只知道，蜀汉已经失去太多人了。</span>';
        }
      }
    }

    // ==================== 选择处理 ====================
    function makeChoice(index) {
      const chapter = chapters[state.chapter - 1];
      const scene = chapter.scenes[state.scene];
      const choice = scene.choices[index];
      
      // 记录选择
      state.choices.push({
        chapter: state.chapter,
        scene: state.scene,
        choice: index,
        text: choice.text
      });
      
      // 应用效果
      if (choice.result) {
        if (choice.result.reputation) state.stats.reputation = Math.min(100, state.stats.reputation + choice.result.reputation);
        if (choice.result.military) state.stats.military = Math.min(100, state.stats.military + choice.result.military);
        if (choice.result.wisdom) state.stats.wisdom = Math.min(100, state.stats.wisdom + choice.result.wisdom);
        if (choice.result.flag) state.flags[choice.result.flag] = true;
      }
      
      // 更新状态条
      updateStatBars();
      
      // 标记按钮
      const buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach((btn, i) => {
        if (i === index) {
          btn.classList.add('selected');
        } else {
          btn.classList.add('faded');
        }
      });
      
      // 延迟后进入下一场景
      setTimeout(() => nextScene(), 800);
    }

    // ==================== 场景切换 ====================
    function nextScene() {
      const chapter = chapters[state.chapter - 1];
      const scene = chapter.scenes[state.scene];
      
      if (scene.nextChapter) {
        // 进入下一章
        if (state.chapter < chapters.length) {
          state.chapter++;
          state.scene = 0;
          showTransition();
        }
      } else if (state.scene < chapter.scenes.length - 1) {
        // 进入下一场景
        state.scene++;
        renderScene();
      }
    }

    // ==================== 章节过渡 ====================
    function showTransition() {
      const nextChapter = chapters[state.chapter - 1];
      
      const transition = document.getElementById('sceneTransition');
      document.getElementById('transitionText').textContent = nextChapter.era;
      document.getElementById('transitionSubtext').textContent = nextChapter.title;
      
      transition.classList.add('active');
      
      setTimeout(() => {
        transition.classList.remove('active');
        renderScene();
      }, 2000);
    }

    // ==================== 结局 ====================
    function showEnding() {
      const endingScreen = document.getElementById('endingScreen');
      const epitaph = document.getElementById('endingEpitaph');
      
      // 根据选择生成个性化结局
      let endingText = '';
      let endingType = '史实';
      
      if (state.flags.historical_ending) {
        endingText = `建兴十二年秋，诸葛亮病逝于五丈原军中，享年五十四岁。

他用二十七年的时光，追随一个注定失败的梦想。他明知不可为而为之，鞠躬尽瘁，死而后已。

${state.flags.loyal_path ? '他始终记得在白帝城的誓言——臣敢竭股肱之力，效忠贞之节，继之以死。他做到了。' : '他用自己的方式，诠释了什么是忠诚——不是愚忠，而是明知不可为而为之的执着。'}

后人评价他："三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。"`;
        endingType = '史实';
      } else if (state.flags.heroic_ending) {
        endingText = `诸葛亮设下最后一计：以木像退司马懿。

他死后，蜀军缓缓撤退。司马懿追击时，看到车上的"诸葛亮"——吓得掉头就跑。

"死诸葛吓走活仲达"，成为千古笑谈。

${state.stats.military > 60 ? '他一生用兵如神，即使在生命的最后一刻，也要让对手颜面尽失。' : '他不是最好的将领，但他用智慧弥补了一切。'}`;
        endingType = '壮烈';
      } else if (state.flags.alternate_ending) {
        endingText = `在生命的最后时刻，诸葛亮想起了那些"如果"。

如果当初留在隆中，继续做一个山野村夫？
如果赤壁之后，接受曹操的招揽？
如果刘备伐吴时，坚持阻拦到底？

${state.stats.wisdom > 70 ? '但他知道，每一个选择都通向唯一的终点。他选择了最难的路，也得到了最无悔的一生。' : '但人生没有如果。他做出了选择，也承担了后果。'}

这就是诸葛孔明——一个明知不可为而为之的人。`;
        endingType = '假设';
      }
      
      epitaph.textContent = endingText;
      document.getElementById('statYears').textContent = 27;
      document.getElementById('statBattles').textContent = state.choices.length;
      document.getElementById('statEnding').textContent = endingType;
      
      endingScreen.classList.add('active');
    }

    // ==================== UI 更新 ====================
    function updateStatBars() {
      document.getElementById('reputationBar').style.width = state.stats.reputation + '%';
      document.getElementById('militaryBar').style.width = state.stats.military + '%';
      document.getElementById('wisdomBar').style.width = state.stats.wisdom + '%';
    }

    function updateProgressDots() {
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((dot, i) => {
        dot.classList.remove('active', 'completed');
        if (i < state.chapter - 1) {
          dot.classList.add('completed');
        } else if (i === state.chapter - 1) {
          dot.classList.add('active');
        }
      });
    }

    // ==================== 重新开始 ====================
    function restart() {
      state.chapter = 1;
      state.scene = 0;
      state.year = 207;
      state.age = 27;
      state.stats = { reputation: 20, military: 30, wisdom: 50 };
      state.choices = [];
      state.flags = {};
      
      document.getElementById('endingScreen').classList.remove('active');
      updateStatBars();
      renderScene();
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
      renderScene();
    });
  </script>
</body>
</html>
