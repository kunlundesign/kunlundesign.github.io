<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诸葛亮传 · 如果历史可以改写</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0b09;
      --bg-secondary: #1a1612;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --text-dim: #5a5045;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --accent-orange: #d4854a;
      --accent-purple: #8a6b9e;
      --border: rgba(201, 165, 92, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .scene-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .scene-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,11,9,0.4) 0%, rgba(13,11,9,0.6) 50%, rgba(13,11,9,0.95) 100%);
    }
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
    }
    .snow .particle {
      background: rgba(255,255,255,0.8);
      width: 4px; height: 4px;
      filter: blur(1px);
      animation: snowFall linear infinite;
    }
    @keyframes snowFall {
      0% { transform: translateY(-10vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    .fire .particle {
      background: var(--accent-orange);
      width: 3px; height: 3px;
      filter: blur(1px);
      animation: fireFly linear infinite;
    }
    @keyframes fireFly {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
    .firefly .particle {
      background: #ffd700;
      width: 4px; height: 4px;
      filter: blur(2px);
      animation: fireflyGlow 6s ease-in-out infinite;
    }
    @keyframes fireflyGlow {
      0%, 100% { opacity: 0.2; transform: translate(0, 0); }
      50% { opacity: 1; transform: translate(20px, -30px); }
    }
    .content-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      z-index: 10;
    }
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      background: linear-gradient(to bottom, rgba(13,11,9,0.9) 0%, transparent 100%);
    }
    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .chapter-info { text-align: right; }
    .chapter-num { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-dim); }
    .chapter-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.4rem; color: var(--accent-gold); }
    
    /* 状态面板 - 古风水墨风格 */
    .stats-panel {
      position: absolute;
      top: 50%;
      left: 1.5rem;
      transform: translateY(-50%);
      width: 140px;
      background: linear-gradient(180deg, rgba(20,18,15,0.95) 0%, rgba(13,11,9,0.9) 100%);
      border: none;
      padding: 1.2rem 1rem;
      backdrop-filter: blur(12px);
      /* 古风边框效果 */
      box-shadow: 
        inset 0 0 0 1px rgba(201,165,92,0.2),
        inset 2px 2px 0 rgba(201,165,92,0.05),
        inset -2px -2px 0 rgba(0,0,0,0.3);
    }
    .stats-panel::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border: 1px solid rgba(201,165,92,0.1);
      pointer-events: none;
    }
    .stats-panel h4 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: var(--accent-gold);
      margin-bottom: 1rem;
      text-align: center;
      border-bottom: 1px solid rgba(201,165,92,0.15);
      padding-bottom: 0.6rem;
    }
    .stat-item {
      margin-bottom: 0.9rem;
      position: relative;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
      letter-spacing: 0.05em;
    }
    .stat-icon {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-right: 0.3rem;
    }
    .stat-value {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 0.9rem;
      color: var(--accent-gold);
    }
    .stat-bar {
      height: 3px;
      background: rgba(201,165,92,0.1);
      position: relative;
      overflow: visible;
    }
    .stat-bar::before,
    .stat-bar::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 7px;
      background: rgba(201,165,92,0.3);
    }
    .stat-bar::before { left: 0; }
    .stat-bar::after { right: 0; }
    .stat-fill {
      height: 100%;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    /* 统一使用金色系，通过透明度区分 */
    .stat-fill.health { 
      background: linear-gradient(90deg, rgba(201,165,92,0.4) 0%, rgba(201,165,92,0.9) 100%);
    }
    .stat-fill.destiny { 
      background: linear-gradient(90deg, rgba(138,107,158,0.4) 0%, rgba(138,107,158,0.9) 100%);
    }
    .stat-fill.military { 
      background: linear-gradient(90deg, rgba(179,60,60,0.4) 0%, rgba(179,60,60,0.8) 100%);
    }
    .stat-fill.wisdom { 
      background: linear-gradient(90deg, rgba(74,107,138,0.4) 0%, rgba(74,107,138,0.9) 100%);
    }
    /* 进度条末端光点 */
    .stat-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 5px;
      background: var(--accent-gold);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(201,165,92,0.6);
      opacity: 0.8;
    }
    
    .divergence-section {
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(201,165,92,0.1);
    }
    .divergence-label {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }
    .divergence-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .divergence-dot {
      width: 10px; 
      height: 10px;
      background: transparent;
      border: 1px solid rgba(201,165,92,0.3);
      position: relative;
    }
    .divergence-dot::before {
      content: '';
      position: absolute;
      inset: 2px;
      background: transparent;
      transition: all 0.5s;
    }
    .divergence-dot.active {
      border-color: var(--accent-purple);
      background: transparent;
      box-shadow: none;
    }
    .divergence-dot.active::before {
      background: var(--accent-purple);
      box-shadow: 0 0 8px rgba(138,107,158,0.6);
    }
    
    /* 时间线 */
    .timeline {
      position: absolute;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
    }
    .timeline-year {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: var(--accent-gold);
      line-height: 1;
    }
    .timeline-age {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .timeline-era {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }
    
    /* 叙事面板 */
    .narrative-panel {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }
    .scene-location {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }
    .narrative-text {
      font-size: 1.1rem;
      line-height: 2;
      margin-bottom: 1.5rem;
    }
    .narrative-text .highlight { color: var(--accent-gold); }
    .narrative-text .changed { color: var(--accent-purple); border-bottom: 1px dotted var(--accent-purple); }
    .narrative-text .dim { color: var(--text-secondary); }
    .narrative-text .danger { color: var(--accent-red); }
    .narrative-text .health-warn { color: #e74c3c; }
    
    .dialogue-bubble {
      background: rgba(26,22,18,0.9);
      border-left: 3px solid var(--accent-gold);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .dialogue-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--accent-gold);
      object-fit: cover;
      flex-shrink: 0;
    }
    .dialogue-avatar.liu { border-color: var(--accent-green); }
    .dialogue-avatar.cao { border-color: var(--accent-red); }
    .dialogue-avatar.wu { border-color: var(--accent-purple); }
    .dialogue-avatar.self { border-color: var(--accent-gold); }
    .dialogue-content {
      flex: 1;
    }
    .dialogue-speaker {
      font-size: 0.8rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }
    .dialogue-speaker.liu { color: var(--accent-green); }
    .dialogue-speaker.cao { color: var(--accent-red); }
    .dialogue-speaker.wu { color: var(--accent-purple); }
    .dialogue-speaker.self { color: var(--accent-gold); }
    .dialogue-text {
      font-size: 1rem;
      line-height: 1.8;
      font-style: italic;
    }
    
    .inner-thought {
      background: linear-gradient(90deg, rgba(74,107,138,0.2) 0%, transparent 100%);
      border-left: 2px solid var(--accent-blue);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }
    .inner-thought.fire { background: linear-gradient(90deg, rgba(179,60,60,0.2) 0%, transparent 100%); border-left-color: var(--accent-red); }
    .inner-thought.destiny { background: linear-gradient(90deg, rgba(138,107,158,0.2) 0%, transparent 100%); border-left-color: var(--accent-purple); }
    .inner-thought.health { background: linear-gradient(90deg, rgba(231,76,60,0.2) 0%, transparent 100%); border-left-color: #e74c3c; }
    .thought-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--accent-blue);
      margin-bottom: 0.5rem;
    }
    .inner-thought.fire .thought-label { color: var(--accent-red); }
    .inner-thought.destiny .thought-label { color: var(--accent-purple); }
    .inner-thought.health .thought-label { color: #e74c3c; }
    
    /* 选项 */
    .choices-container { margin-top: 1.5rem; }
    .choices-prompt {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }
    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1rem 1.25rem;
      margin-bottom: 0.6rem;
      background: rgba(26,22,18,0.85);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201,165,92,0.1);
      transform: translateX(6px);
    }
    .choice-btn.divergent { border-color: rgba(138,107,158,0.5); }
    .choice-btn.divergent:hover { border-color: var(--accent-purple); background: rgba(138,107,158,0.1); }
    .choice-btn.health-choice { border-color: rgba(39,174,96,0.5); }
    .choice-btn.health-choice:hover { border-color: #27ae60; background: rgba(39,174,96,0.1); }
    .choice-text { display: block; margin-bottom: 0.2rem; }
    .choice-subtext { font-size: 0.75rem; color: var(--text-dim); }
    .choice-effect {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .choice-btn:hover .choice-effect { opacity: 1; }
    .choice-effect.health-up { color: #27ae60; background: rgba(39,174,96,0.2); }
    .choice-effect.health-down { color: #e74c3c; background: rgba(231,76,60,0.2); }
    .choice-effect.divergent { color: var(--accent-purple); background: rgba(138,107,158,0.2); }
    .choice-btn.selected { border-color: var(--accent-gold); background: rgba(201,165,92,0.15); }
    .choice-btn.faded { opacity: 0.3; transform: translateX(0); pointer-events: none; }
    
    .continue-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }
    .continue-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }
    
    /* 过渡 */
    .scene-transition {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s;
    }
    .scene-transition.active { opacity: 1; pointer-events: all; }
    .transition-year { font-family: 'Ma Shan Zheng', cursive; font-size: 4rem; color: var(--accent-gold); }
    .transition-text { font-size: 1.2rem; color: var(--text-primary); margin-top: 0.5rem; }
    .transition-subtext { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .transition-health {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      border: 1px solid;
    }
    .transition-health.good { border-color: #27ae60; color: #27ae60; }
    .transition-health.warn { border-color: #f39c12; color: #f39c12; }
    .transition-health.danger { border-color: #e74c3c; color: #e74c3c; }
    
    /* 结局 */
    .ending-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      overflow-y: auto;
    }
    .ending-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(201,165,92,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(139,90,139,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(201,165,92,0.03) 0%, transparent 70%);
      pointer-events: none;
    }
    .ending-screen.active { display: flex; }
    /* 结尾页星光粒子 */
    .ending-stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ending-star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(201,165,92,0.6);
      border-radius: 50%;
      animation: starTwinkle 3s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    .ending-badge {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
    }
    .ending-badge.alternate { border-color: var(--accent-purple); color: var(--accent-purple); }
    .ending-badge.golden { border-color: #f1c40f; color: #f1c40f; background: rgba(241,196,15,0.1); }
    .ending-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.5rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }
    .ending-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .ending-epitaph {
      max-width: 600px;
      font-size: 1rem;
      line-height: 2;
      color: var(--text-primary);
      margin-bottom: 2rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
      background: rgba(26,22,18,0.5);
      text-align: left;
      white-space: pre-line;
    }
    .ending-stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ending-stat { text-align: center; }
    .ending-stat-value { font-size: 1.8rem; color: var(--accent-gold); }
    .ending-stat-label { font-size: 0.7rem; color: var(--text-secondary); }
    .ending-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .ending-btn {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }
    .ending-btn:hover { background: var(--accent-gold); color: var(--bg-primary); }
    .ending-btn.primary { background: var(--accent-gold); color: var(--bg-primary); }
    
    /* 动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    
    /* 响应式 */
    @media (max-width: 900px) {
      .stats-panel { display: none; }
      .timeline { right: 1rem; }
      .timeline-year { font-size: 2rem; }
    }
    @media (max-width: 600px) {
      .content-layer { padding: 1rem; }
      .narrative-text { font-size: 1rem; }
      .timeline { position: static; transform: none; text-align: center; margin-bottom: 1rem; }
    }
    
    /* 音乐控制 - 古风风格 - 暂时隐藏 */
    .audio-control {
      display: none; /* 暂时禁用，等待可用音乐源 */
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.9rem;
      background: rgba(13, 11, 9, 0.9);
      border: 1px solid rgba(201,165,92,0.2);
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .audio-control:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.05);
    }
    .audio-icon {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1rem;
      color: var(--text-dim);
    }
    .audio-control.playing .audio-icon {
      color: var(--accent-gold);
    }
    .audio-text {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .audio-control.playing .audio-text {
      color: var(--text-secondary);
    }
    .audio-control.playing::after {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent-gold);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      margin-left: 0.3rem;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <!-- 音乐控制 -->
  <div class="audio-control" id="audioControl" onclick="toggleMusic()">
    <span class="audio-icon" id="audioIcon">琴</span>
    <span class="audio-text" id="audioText">奏乐</span>
  </div>
  <audio id="bgMusic" loop preload="auto"></audio>

  <div class="scene-transition" id="sceneTransition">
    <div class="transition-year" id="transitionYear">207</div>
    <div class="transition-text" id="transitionText">建安十二年</div>
    <div class="transition-subtext" id="transitionSubtext">卧龙出山</div>
    <div class="transition-health" id="transitionHealth"></div>
  </div>

  <div class="game-container">
    <div class="scene-bg" id="sceneBg"></div>
    <div class="particles" id="particles"></div>

// ==================== 工具函数 ====================
function createParticles(type) {
  const c = document.getElementById('particles');
  c.innerHTML = '';
  c.className = 'particles ' + type;
  if (type === 'none') return;
  const count = type === 'snow' ? 40 : type === 'fire' ? 25 : 15;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (4 + Math.random() * 8) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    if (type === 'firefly') {
      p.style.top = (20 + Math.random() * 60) + '%';
      p.style.left = (10 + Math.random() * 80) + '%';
    }
    c.appendChild(p);
  }
}

function updateStats() {
  ['health','destiny','military','wisdom'].forEach(s => {
    document.getElementById(s+'Value').textContent = state.stats[s];
    document.getElementById(s+'Bar').style.width = state.stats[s] + '%';
  });
  document.querySelectorAll('.divergence-dot').forEach((d,i) => {
    d.classList.toggle('active', i < state.divergence);
  });
}

function applyResult(result) {
  if (!result) return;
  ['health','destiny','military','wisdom'].forEach(s => {
    if (result[s]) state.stats[s] = Math.max(0, Math.min(100, state.stats[s] + result[s]));
  });
  if (result.divergence) state.divergence = Math.min(5, state.divergence + result.divergence);
  if (result.flag) state.flags[result.flag] = true;
  updateStats();
}

function createEndingStars() {

    star.className = 'ending-star';

    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    
    // 随机大小

    star.style.width = size + 'px';

    // 部分星星用紫色

    }
    
    container.appendChild(star);
  }
}

// ==================== 场景渲染 ====================
function renderScene() {
  const ch = chapters[state.chapter];
  if (!ch) return;
  const sc = ch.scenes[state.scene];
  if (!sc) return;
  
  document.getElementById('sceneBg').style.backgroundImage = `url('${sc.bg || ch.bg}')`;
  createParticles(sc.particles || ch.particles);
  
  document.getElementById('chapterNum').textContent = ch.num;
  document.getElementById('chapterTitle').textContent = ch.title;
  document.getElementById('timelineYear').textContent = ch.year;
  document.getElementById('timelineAge').textContent = ch.age + '岁';
  document.getElementById('timelineEra').textContent = ch.era;
  
  updateStats();
  
  const panel = document.getElementById('narrativePanel');
  let html = '';
  if (sc.location) html += `<div class="scene-location fade-in">${sc.location}</div>`;
  
  if (sc.dynamicContent) {
    html += `<div class="narrative-text">${getDynamicContent(sc.dynamicContent)}</div>`;
  } else if (sc.content) {
    html += `<div class="narrative-text">${sc.content}</div>`;
    if (sc.choices) {
      html += '<div class="choices-container fade-in delay-4"><div class="choices-prompt">你的选择</div>';
      sc.choices.forEach((c,i) => {
        const cls = c.divergent ? 'divergent' : c.healthChoice ? 'health-choice' : '';
        const eff = c.effectType === 'health-up' ? 'health-up' : c.effectType === 'health-down' ? 'health-down' : c.effectType === 'divergent' ? 'divergent' : '';
        const effText = c.effectType === 'health-up' ? '+健康' : c.effectType === 'health-down' ? '-健康' : c.divergent ? '⚡改变历史' : '';
        html += `<button class="choice-btn ${cls}" onclick="makeChoiceIdx(${i})">
          <span class="choice-text">${c.text}</span>
          <span class="choice-subtext">${c.subtext}</span>
          ${effText ? `<span class="choice-effect ${eff}">${effText}</span>` : ''}
        </button>`;
      });
      html += '</div>';
    } else if (!sc.nextChapter) {
      html += '<button class="continue-btn fade-in delay-4" onclick="nextScene()">继续 →</button>';
    } else {
      html += '<button class="continue-btn fade-in delay-4" onclick="nextChapter()">继续 →</button>';
    }
  }
  panel.innerHTML = html;
}

function makeChoiceIdx(idx) {
  const sc = chapters[state.chapter].scenes[state.scene];
  const c = sc.choices[idx];
  state.choices.push({chapter:state.chapter,scene:state.scene,choice:idx});
  applyResult(c.result);
  document.querySelectorAll('.choice-btn').forEach((b,i) => b.classList.add(i===idx?'selected':'faded'));
  setTimeout(nextScene, 600);
}

function makeChoice(result) {
  applyResult(result);
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('faded'));
  setTimeout(nextScene, 600);
}

function nextScene() {
  const ch = chapters[state.chapter];
  if (state.scene < ch.scenes.length - 1) {
    state.scene++;
    renderScene();
  } else {
    nextChapter();
  }
}

function nextChapter() {
  if (state.chapter < chapters.length - 1) {
    state.chapter++;
    state.scene = 0;
    showTransition();
  }
}

function showTransition() {
  const ch = chapters[state.chapter];
  document.getElementById('transitionYear').textContent = ch.year;
  document.getElementById('transitionText').textContent = ch.era;
  document.getElementById('transitionSubtext').textContent = ch.title;
  
  const h = state.stats.health;
  const hEl = document.getElementById('transitionHealth');
  if (h >= 60) {
    hEl.textContent = '身体状况：良好';
    hEl.className = 'transition-health good';
  } else if (h >= 30) {
    hEl.textContent = '身体状况：疲惫';
    hEl.className = 'transition-health warn';
  } else {
    hEl.textContent = '身体状况：危险';
    hEl.className = 'transition-health danger';
  }
  hEl.style.display = 'block';
  
  document.getElementById('sceneTransition').classList.add('active');
  setTimeout(() => {
    document.getElementById('sceneTransition').classList.remove('active');
    renderScene();
  }, 2500);
}

function restart() {
  state.chapter = 0;
  state.scene = 0;
  state.stats = {health:80,destiny:30,military:25,wisdom:50};
  state.divergence = 0;
  state.choices = [];
  state.flags = {};
  document.getElementById('endingScreen').classList.remove('active');
  renderScene();
}

document.addEventListener('DOMContentLoaded', renderScene);

// ==================== 音乐系统 ====================

  1: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.05.%20Side%20A%20-%20The%20Great%20Ambuscade.mp3', // 赤壁 - 十面埋伏
  2: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.06.%20Side%20B%20-%20Yearning%20On%20River%20Shiang.mp3', // 白帝城 - 悲凉
  3: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.05.%20Side%20A%20-%20The%20Great%20Ambuscade.mp3', // 北伐 - 悲壮
  4: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.08.%20Side%20B%20-%20In%20Remembrance%20Of%20An%20Old%20Friend.mp3', // 五丈原 - 怀旧
  5: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.01.%20Side%20A%20-%20Four%20Tokens%20Of%20Happiness.mp3', // 长安 - 胜利
  6: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.07.%20Side%20B%20-%20The%20Flowing%20Streams.mp3', // 洛阳 - 流水
  7: 'https://archive.org/download/lp_exotic-music-of-ancient-china_lui-tsun-yuen_0/disc1/01.09.%20Side%20B%20-%20The%20Elegant%20Orchid.mp3'  // 归一 - 平和
};

let musicPlaying = false;
let currentTrack = -1;

function toggleMusic() {
  const audio = document.getElementById('bgMusic');
  const control = document.getElementById('audioControl');
  const icon = document.getElementById('audioIcon');
  const text = document.getElementById('audioText');
  
  if (musicPlaying) {
    audio.pause();
    musicPlaying = false;
    control.classList.remove('playing');
    icon.textContent = '琴';
    text.textContent = '奏乐';
  } else {
    playChapterMusic(state.chapter);
    musicPlaying = true;
    control.classList.add('playing');
    icon.textContent = '樂';
    text.textContent = '止';
  }
}

function playChapterMusic(chapter) {
  if (!musicPlaying) return;
  
  const audio = document.getElementById('bgMusic');
  const track = musicTracks[chapter] || musicTracks[0];
  
  if (currentTrack !== chapter) {
    currentTrack = chapter;
    audio.src = track;
    audio.volume = 0.3;
    audio.play().catch(e => {
      console.log('Autoplay blocked, user interaction required');
    });
  }
}

// 修改 showTransition 以切换音乐
const originalShowTransition = showTransition;
showTransition = function() {
  originalShowTransition();
  setTimeout(() => playChapterMusic(state.chapter), 500);
};
</script>
