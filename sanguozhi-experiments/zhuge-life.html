<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诸葛亮传 · 如果历史可以改写</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0b09;
      --bg-secondary: #1a1612;
      --bg-card: #241f1a;
      --text-primary: #e8e4df;
      --text-secondary: #a09080;
      --text-dim: #5a5045;
      --accent-gold: #c9a55c;
      --accent-red: #b33c3c;
      --accent-blue: #4a6b8a;
      --accent-green: #5a8a5a;
      --accent-orange: #d4854a;
      --accent-purple: #8a6b9e;
      --border: rgba(201, 165, 92, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ==================== 全屏场景系统 ==================== */
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 背景层 */
    .scene-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 1.5s ease;
    }

    .scene-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13, 11, 9, 0.4) 0%,
        rgba(13, 11, 9, 0.6) 50%,
        rgba(13, 11, 9, 0.95) 100%
      );
    }

    /* 环境粒子效果 */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
    }

    /* 雪花 */
    .snow .particle {
      background: rgba(255, 255, 255, 0.8);
      width: 4px;
      height: 4px;
      filter: blur(1px);
      animation: snowFall linear infinite;
    }

    @keyframes snowFall {
      0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
    }

    /* 火星 */
    .fire .particle {
      background: var(--accent-orange);
      width: 3px;
      height: 3px;
      filter: blur(1px);
      animation: fireFly linear infinite;
    }

    @keyframes fireFly {
      0% { transform: translateY(100vh) translateX(0); opacity: 1; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    /* 萤火虫 */
    .firefly .particle {
      background: #ffd700;
      width: 4px;
      height: 4px;
      filter: blur(2px);
      animation: fireflyGlow 6s ease-in-out infinite;
    }

    @keyframes fireflyGlow {
      0%, 100% { opacity: 0.2; transform: translate(0, 0); }
      25% { opacity: 1; transform: translate(20px, -15px); }
      50% { opacity: 0.4; transform: translate(-10px, -30px); }
      75% { opacity: 0.9; transform: translate(15px, -10px); }
    }

    /* ==================== 内容层 ==================== */
    .content-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      z-index: 10;
    }

    /* 顶部信息栏 */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.5rem 2rem;
      background: linear-gradient(to bottom, rgba(13,11,9,0.9) 0%, transparent 100%);
    }

    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.7;
      transition: all 0.3s;
    }

    .back-btn:hover {
      opacity: 1;
      color: var(--accent-gold);
    }

    .chapter-info {
      text-align: right;
    }

    .chapter-num {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }

    .chapter-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.4rem;
      color: var(--accent-gold);
    }

    /* ==================== 历史轨迹面板 ==================== */
    .history-panel {
      position: absolute;
      top: 50%;
      left: 1.5rem;
      transform: translateY(-50%);
      width: 140px;
      background: rgba(13, 11, 9, 0.85);
      border: 1px solid var(--border);
      padding: 1rem;
      backdrop-filter: blur(10px);
    }

    .history-panel h4 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent-gold);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .history-meter {
      margin-bottom: 0.75rem;
    }

    .history-meter-label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
    }

    .history-meter-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .history-meter-fill {
      height: 100%;
      transition: width 0.5s ease;
      border-radius: 3px;
    }

    .meter-destiny { background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); }
    .meter-military { background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); }
    .meter-wisdom { background: linear-gradient(90deg, var(--accent-green), var(--accent-gold)); }

    .history-divergence {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .divergence-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .divergence-indicator {
      display: flex;
      gap: 3px;
    }

    .divergence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .divergence-dot.active {
      background: var(--accent-gold);
      box-shadow: 0 0 8px var(--accent-gold);
    }

    .divergence-dot.changed {
      background: var(--accent-purple);
      box-shadow: 0 0 8px var(--accent-purple);
    }

    /* ==================== 时间线 ==================== */
    .timeline {
      position: absolute;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
    }

    .timeline-year {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: var(--accent-gold);
      line-height: 1;
      text-shadow: 0 0 30px rgba(201, 165, 92, 0.3);
    }

    .timeline-age {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .timeline-era {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }

    /* ==================== 叙事面板 ==================== */
    .narrative-panel {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .scene-location {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }

    .narrative-text {
      font-size: 1.15rem;
      line-height: 2.1;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }

    .narrative-text .highlight {
      color: var(--accent-gold);
    }

    .narrative-text .changed {
      color: var(--accent-purple);
      border-bottom: 1px dotted var(--accent-purple);
    }

    .narrative-text .dim {
      color: var(--text-secondary);
    }

    .narrative-text .fire-text {
      color: var(--accent-orange);
      text-shadow: 0 0 10px rgba(212, 133, 74, 0.5);
    }

    /* 对话气泡 */
    .dialogue-bubble {
      background: rgba(26, 22, 18, 0.9);
      border-left: 3px solid var(--accent-gold);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      backdrop-filter: blur(10px);
    }

    .dialogue-speaker {
      font-size: 0.8rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    .dialogue-speaker.liu { color: var(--accent-green); }
    .dialogue-speaker.cao { color: var(--accent-blue); }
    .dialogue-speaker.zhou { color: var(--accent-red); }
    .dialogue-speaker.sima { color: var(--accent-purple); }
    .dialogue-speaker.self { color: var(--accent-gold); }

    .dialogue-text {
      font-size: 1.05rem;
      line-height: 1.9;
      font-style: italic;
    }

    /* 内心独白 */
    .inner-thought {
      background: linear-gradient(90deg, rgba(74, 107, 138, 0.2) 0%, transparent 100%);
      border-left: 2px solid var(--accent-blue);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .inner-thought.fire {
      background: linear-gradient(90deg, rgba(179, 60, 60, 0.2) 0%, transparent 100%);
      border-left-color: var(--accent-red);
    }

    .inner-thought.destiny {
      background: linear-gradient(90deg, rgba(138, 107, 158, 0.2) 0%, transparent 100%);
      border-left-color: var(--accent-purple);
    }

    .thought-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent-blue);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .inner-thought.fire .thought-label { color: var(--accent-red); }
    .inner-thought.destiny .thought-label { color: var(--accent-purple); }

    /* ==================== 选项系统 ==================== */
    .choices-container {
      margin-top: 2rem;
    }

    .choices-prompt {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      background: rgba(26, 22, 18, 0.85);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 3px;
      height: 100%;
      background: var(--accent-gold);
      transform: scaleY(0);
      transition: transform 0.3s ease;
    }

    .choice-btn:hover {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.1);
      transform: translateX(8px);
    }

    .choice-btn:hover::before {
      transform: scaleY(1);
    }

    .choice-btn.divergent {
      border-color: rgba(138, 107, 158, 0.5);
    }

    .choice-btn.divergent:hover {
      border-color: var(--accent-purple);
      background: rgba(138, 107, 158, 0.1);
    }

    .choice-btn.divergent::before {
      background: var(--accent-purple);
    }

    .choice-text {
      display: block;
      margin-bottom: 0.25rem;
    }

    .choice-subtext {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .choice-effect {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .choice-btn:hover .choice-effect {
      opacity: 1;
    }

    .choice-effect.normal {
      color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.2);
    }

    .choice-effect.divergent {
      color: var(--accent-purple);
      background: rgba(138, 107, 158, 0.2);
    }

    .choice-btn.selected {
      border-color: var(--accent-gold);
      background: rgba(201, 165, 92, 0.15);
    }

    .choice-btn.faded {
      opacity: 0.3;
      transform: translateX(0);
      pointer-events: none;
    }

    /* ==================== 继续按钮 ==================== */
    .continue-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .continue-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    .continue-btn .arrow {
      transition: transform 0.3s;
    }

    .continue-btn:hover .arrow {
      transform: translateX(4px);
    }

    /* ==================== 场景过渡 ==================== */
    .scene-transition {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .scene-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    .transition-year {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 4rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 40px rgba(201, 165, 92, 0.5);
    }

    .transition-text {
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .transition-subtext {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .transition-divergence {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(138, 107, 158, 0.2);
      border: 1px solid var(--accent-purple);
      color: var(--accent-purple);
      font-size: 0.85rem;
      display: none;
    }

    .transition-divergence.active {
      display: block;
    }

    /* ==================== 结局画面 ==================== */
    .ending-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      overflow-y: auto;
    }

    .ending-screen.active {
      display: flex;
    }

    .ending-badge {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
    }

    .ending-badge.alternate {
      border-color: var(--accent-purple);
      color: var(--accent-purple);
      background: rgba(138, 107, 158, 0.1);
    }

    .ending-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }

    .ending-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .ending-epitaph {
      max-width: 600px;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--text-primary);
      margin-bottom: 2.5rem;
      padding: 2rem;
      border: 1px solid var(--border);
      background: rgba(26, 22, 18, 0.5);
      text-align: left;
    }

    .ending-stats {
      display: flex;
      gap: 3rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ending-stat {
      text-align: center;
    }

    .ending-stat-value {
      font-size: 2rem;
      color: var(--accent-gold);
      font-weight: 600;
    }

    .ending-stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    .ending-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ending-btn {
      padding: 1rem 2rem;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .ending-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    .ending-btn.primary {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    /* ==================== 进度点 ==================== */
    .progress-dots {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .progress-dot.active {
      background: var(--accent-gold);
      box-shadow: 0 0 8px var(--accent-gold);
    }

    .progress-dot.completed {
      background: var(--text-dim);
    }

    .progress-dot.diverged {
      background: var(--accent-purple);
    }

    /* ==================== 动画 ==================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeInUp 0.8s ease forwards;
    }

    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }

    /* ==================== 响应式 ==================== */
    @media (max-width: 900px) {
      .history-panel {
        display: none;
      }

      .timeline {
        right: 1rem;
      }

      .timeline-year {
        font-size: 2rem;
      }
    }

    @media (max-width: 600px) {
      .content-layer {
        padding: 1rem;
      }

      .narrative-text {
        font-size: 1rem;
        line-height: 1.9;
      }

      .timeline {
        position: static;
        transform: none;
        text-align: center;
        margin-bottom: 1rem;
      }

      .timeline-year {
        font-size: 1.8rem;
      }

      .top-bar {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- 场景过渡层 -->
  <div class="scene-transition" id="sceneTransition">
    <div class="transition-year" id="transitionYear">207</div>
    <div class="transition-text" id="transitionText">建安十二年</div>
    <div class="transition-subtext" id="transitionSubtext">隆中 · 卧龙岗</div>
    <div class="transition-divergence" id="transitionDivergence">
      ⚡ 历史正在偏离原有轨迹...
    </div>
  </div>

  <!-- 游戏容器 -->
  <div class="game-container">
    <div class="scene-bg" id="sceneBg"></div>
    <div class="particles" id="particles"></div>

    <div class="content-layer">
      <div class="top-bar">
        <a href="../sanguozhi/" class="back-btn">← 返回三国志</a>
        <div class="chapter-info">
          <div class="chapter-num" id="chapterNum">第一章</div>
          <div class="chapter-title" id="chapterTitle">卧龙出山</div>
        </div>
      </div>

      <!-- 历史轨迹面板 -->
      <div class="history-panel">
        <h4>📜 历史轨迹</h4>
        <div class="history-meter">
          <div class="history-meter-label">
            <span>天命</span>
            <span id="destinyValue">30</span>
          </div>
          <div class="history-meter-bar">
            <div class="history-meter-fill meter-destiny" id="destinyBar" style="width: 30%"></div>
          </div>
        </div>
        <div class="history-meter">
          <div class="history-meter-label">
            <span>军略</span>
            <span id="militaryValue">25</span>
          </div>
          <div class="history-meter-bar">
            <div class="history-meter-fill meter-military" id="militaryBar" style="width: 25%"></div>
          </div>
        </div>
        <div class="history-meter">
          <div class="history-meter-label">
            <span>智谋</span>
            <span id="wisdomValue">50</span>
          </div>
          <div class="history-meter-bar">
            <div class="history-meter-fill meter-wisdom" id="wisdomBar" style="width: 50%"></div>
          </div>
        </div>
        <div class="history-divergence">
          <div class="divergence-label">历史偏离度</div>
          <div class="divergence-indicator" id="divergenceIndicator">
            <div class="divergence-dot"></div>
            <div class="divergence-dot"></div>
            <div class="divergence-dot"></div>
            <div class="divergence-dot"></div>
            <div class="divergence-dot"></div>
          </div>
        </div>
      </div>

      <!-- 时间线 -->
      <div class="timeline">
        <div class="timeline-year" id="timelineYear">207</div>
        <div class="timeline-age" id="timelineAge">二十七岁</div>
        <div class="timeline-era" id="timelineEra">建安十二年</div>
      </div>

      <!-- 叙事面板 -->
      <div class="narrative-panel" id="narrativePanel"></div>

      <!-- 进度点 -->
      <div class="progress-dots" id="progressDots"></div>
    </div>
  </div>

  <!-- 结局画面 -->

    // ==================== 粒子系统 ====================
    function createParticles(type) {
      const container = document.getElementById('particles');
      container.innerHTML = '';
      container.className = 'particles ' + type;
      
      if (type === 'none') return;
      
      const count = type === 'snow' ? 40 : type === 'fire' ? 25 : 15;
      
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (4 + Math.random() * 8) + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        if (type === 'firefly') {
          p.style.top = (20 + Math.random() * 60) + '%';
          p.style.left = (10 + Math.random() * 80) + '%';
        }
        container.appendChild(p);
      }
    }

              <p class="fade-in">你的泪水打湿了席子。刘备释然地笑了，缓缓闭上眼睛。</p>
              <p class="fade-in delay-1">窗外月光如水。你想起二十七岁那年，在隆中第一次见到他。</p>
              <p class="fade-in delay-2 dim">"孤之有孔明，犹鱼之有水也。"</p>
              <p class="fade-in delay-3">鱼已将死，水当何依？</p>
            `;
          } else if (state.flags.silent_accept) {
            text = `
              <p class="fade-in">刘备看着你的眼睛，良久，他笑了："孔明，朕信你。"</p>
              <p class="fade-in delay-1">你没有回答。有些话不必说出口。</p>
              <p class="fade-in delay-2 dim">但你心里清楚：从这一刻起，蜀汉的命运，就压在你一个人肩上了。</p>
            `;
          } else if (state.flags.ambiguous_answer) {
            text = `
              <p class="fade-in">刘备愣了一瞬，随即苦笑："孔明啊孔明……你果然从不说没把握的话。"</p>
              <div class="inner-thought destiny fade-in delay-1">
                <div class="thought-label">改变</div>
                你留了余地。"相机行事"——这四个字，既是承诺，也是<span class="changed">退路</span>。
              </div>
              <p class="fade-in delay-2">刘备闭上眼睛，再没有说话。</p>
              <p class="fade-in delay-3">你不知道他是放心了，还是……死不瞑目。</p>
            `;
          }
          text += `<div class="fade-in delay-4"><button class="continue-btn" onclick="nextScene()">继续 <span class="arrow">→</span></button></div>`;
          return text;
        },
        'chapter4_scene3': () => {
          let text = '';
          if (state.flags.kill_masu) {
            text = `
              <p class="fade-in">马谡伏诛那天，你独自在帐中坐到天明。</p>
              <p class="fade-in delay-1 dim">他曾是你最看好的年轻人。但军法如山，不可不严。</p>
            `;
          } else if (state.flags.spare_masu) {
            text = `
              <p class="fade-in">你网开一面，但军中议论纷纷。</p>
              <p class="fade-in delay-1 dim">有人说丞相徇私，有人说丞相仁厚。但你知道——<span class="changed">蜀汉已经失去太多人才了</span>。</p>
            `;
          } else if (state.flags.counter_attack) {
            text = `
              <p class="fade-in">你的反击奏效——张郃后军大乱，被迫撤退。</p>
              <p class="fade-in delay-1"><span class="changed">街亭保住了。</span>这是历史上从未发生过的事。</p>
              <div class="inner-thought destiny fade-in delay-2">
                <div class="thought-label">转折</div>
                历史的轨迹，在这里发生了重大偏移。蜀军士气大振，三郡彻底归附。
              </div>
            `;
          }
          text += `
            <p class="fade-in delay-2">你上表自贬三等，承担责任。但你没有放弃。</p>
            <p class="fade-in delay-3 highlight">第二次、第三次、第四次、第五次……直到最后一次。</p>
          `;
          text += `<div class="fade-in delay-4"><button class="continue-btn" onclick="nextChapter()">继续 <span class="arrow">→</span></button></div>`;
          return text;
        },
        'chapter5_scene2': () => {
          // 根据历史偏离度决定最终选项
          const highDivergence = state.divergence >= 3;
          const midDivergence = state.divergence >= 2;
          
          let text = `
            <p class="fade-in">夜深，你让人扶你起身，提笔写最后一封信。</p>
            <div class="dialogue-bubble fade-in delay-1">
              <div class="dialogue-speaker self">诸葛亮</div>
              <div class="dialogue-text">"臣鞠躬尽瘁，死而后已……"</div>
            </div>
            <p class="fade-in delay-2 dim">窗外，秋风萧瑟，星光黯淡。</p>
          `;
          
          text += `<div class="choices-container fade-in delay-3"><div class="choices-prompt">最后的选择</div>`;
          
          // 基础选项：史实结局
          text += `
            <button class="choice-btn" onclick="finalChoice('historical')">
              <span class="choice-text">安排撤军，从容赴死</span>
              <span class="choice-subtext">鞠躬尽瘁，死而后已</span>
              <span class="choice-effect normal">史实结局</span>
            </button>
          `;
          
          // 中等偏离：壮烈结局
          if (midDivergence || state.stats.military >= 60) {
            text += `
              <button class="choice-btn" onclick="finalChoice('heroic')">
                <span class="choice-text">设下最后一计：木像退敌</span>
                <span class="choice-subtext">死诸葛吓走活仲达</span>
                <span class="choice-effect normal">壮烈结局</span>
              </button>
            `;
          }
          
          // 高偏离：可能的胜利
          if (highDivergence && state.stats.military >= 50 && state.stats.destiny >= 40) {
            text += `
              <button class="choice-btn divergent" onclick="finalChoice('victory')">
                <span class="choice-text">孤注一掷——发动总攻！</span>
                <span class="choice-subtext">在生命的最后燃烧一切</span>
                <span class="choice-effect divergent">⚡ 改写历史</span>
              </button>
            `;
          }
          
          // 极高偏离 + 野心路线：自立结局
          if (state.divergence >= 4 && state.flags.ambiguous_answer) {
            text += `
              <button class="choice-btn divergent" onclick="finalChoice('emperor')">
                <span class="choice-text">"君可自取"……先帝，恕罪"</span>
                <span class="choice-subtext">建立新的秩序</span>
                <span class="choice-effect divergent">⚡ 禁忌结局</span>
              </button>
            `;
          }
          
          text += `</div>`;
          return text;
        }
      };
      
      return contents[key] ? contents[key]() : '';
    }

    // ==================== 最终结局 ====================
    function finalChoice(ending) {
      const endings = {
        'historical': {
          badge: '史实结局',
          badgeClass: '',
          title: '星落秋风五丈原',
          subtitle: '诸葛亮 · 181-234',
          epitaph: `建兴十二年秋，诸葛亮病逝于五丈原军中，享年五十四岁。

他用二十七年的时光，追随一个注定艰难的梦想。他明知不可为而为之，六出祁山，鞠躬尽瘁。

${state.flags.loyal_oath ? '他始终记得白帝城的誓言——效忠贞之节，继之以死。他做到了。' : '他用自己的方式，诠释了什么是坚持——不是愚忠，而是明知不可为而为之的执着。'}

后人评价他："三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。"

蜀汉又延续了二十九年，最终在公元263年灭亡。但诸葛亮的名字，永远铭刻在历史之中。`
        },
        'heroic': {
          badge: '壮烈结局',
          badgeClass: '',
          title: '死诸葛吓走活仲达',
          subtitle: '诸葛亮 · 181-234',
          epitaph: `诸葛亮设下最后一计：以木像退司马懿。

他死后，蜀军依计缓缓撤退。司马懿追击时，看到车上的"诸葛亮"端坐不动——吓得仲达掉头就跑。

"死诸葛吓走活仲达"，成为千古笑谈。

${state.stats.military > 60 ? '他一生用兵如神，即使在生命的最后一刻，也要让对手颜面尽失。' : '他不是最能打的将领，但他用智慧弥补了一切。'}

这是诸葛孔明最后的玩笑——也是最后的胜利。`
        },
        'victory': {
          badge: '改写历史',
          badgeClass: 'alternate',
          title: '克复中原',
          subtitle: '诸葛亮 · 181-???',
          epitaph: `建兴十二年秋，诸葛亮拖着病体，发动了最后的总攻。

这是一场豪赌——蜀军精锐尽出，与司马懿决战于五丈原。

战斗持续了三天三夜。就在司马懿以为胜券在握时，魏延率奇兵突袭后方，一举焚毁魏军粮草。

司马懿大军溃散。诸葛亮……赢了。

${state.flags.counter_attack ? '这一次，他又一次创造了奇迹——就像多年前的街亭一样。' : ''}

公元235年春，蜀军攻入长安。诸葛亮带病入城，在未央宫前驻足良久。

"先帝……臣做到了。"

他没能看到洛阳的城墙。但他的弟子姜维，在十年后完成了这一切。

建兴二十五年，汉室复兴。史书将这段历史称为——"季汉中兴"。`,
          bg: 'images/scene-victory.png'
        },
        'emperor': {
          badge: '禁忌结局',
          badgeClass: 'alternate',
          title: '受禅登基',
          subtitle: '诸葛亮 · 181-???',
          epitaph: `"君可自取。"

这四个字，在诸葛亮心中回响了十一年。

刘禅昏庸，朝政日非。蜀汉在他手中，只会慢慢腐烂。

建兴十二年，诸葛亮在五丈原前线，接到了成都的密报：刘禅宠信宦官黄皓，意图召回丞相，解除兵权。

他闭上眼睛，做出了一个决定。

三日后，诸葛亮班师回朝。刘禅被迫"禅让"，退居永安宫。

史书记载，丞相登基那日，成都万民空巷。

但也有人说，他在登基大典上流了泪。

是愧疚？是解脱？还是别的什么？

没有人知道。

新朝建立，年号"兴汉"。这是一个与历史完全不同的三国。`
        }
      };
      
      const e = endings[ending];
      
      document.getElementById('endingBadge').textContent = e.badge;
      document.getElementById('endingBadge').className = 'ending-badge ' + e.badgeClass;
      document.getElementById('endingTitle').textContent = e.title;
      document.getElementById('endingSubtitle').textContent = e.subtitle;
      document.getElementById('endingEpitaph').textContent = e.epitaph;
      document.getElementById('statYears').textContent = 27;
      document.getElementById('statChoices').textContent = state.choices.length;
      document.getElementById('statDivergence').textContent = (state.divergence * 20) + '%';
      
      if (e.bg) {
        document.getElementById('sceneBg').style.backgroundImage = `url('${e.bg}')`;
      }
      
      document.getElementById('endingScreen').classList.add('active');
    }

    // ==================== 渲染场景 ====================
    function renderScene() {
      const chapter = chapters[state.chapter];
      const scene = chapter.scenes[state.scene];
      
      // 背景
      const bgUrl = scene.bg || chapter.bg;
      document.getElementById('sceneBg').style.backgroundImage = `url('${bgUrl}')`;
      
      // 粒子
      createParticles(scene.particles || chapter.particles);
      
      // 章节信息
      document.getElementById('chapterNum').textContent = chapter.num;
      document.getElementById('chapterTitle').textContent = chapter.title;
      document.getElementById('timelineYear').textContent = chapter.year;
      document.getElementById('timelineAge').textContent = chapter.age + '岁';
      document.getElementById('timelineEra').textContent = chapter.era;
      
      // 更新进度和状态
      updateProgressDots();
      updateStats();
      
      // 渲染内容
      const panel = document.getElementById('narrativePanel');
      let html = '';
      
      if (scene.location) {
        html += `<div class="scene-location fade-in">${scene.location}</div>`;
      }
      
      if (scene.dynamicContent) {
        html += `<div class="narrative-text">${getDynamicContent(scene.dynamicContent)}</div>`;
      } else if (scene.content) {
        html += `<div class="narrative-text">${scene.content}</div>`;
        
        if (scene.choices) {
          html += `<div class="choices-container fade-in delay-4"><div class="choices-prompt">你的选择</div>`;
          scene.choices.forEach((c, i) => {
            const divergentClass = c.divergent ? 'divergent' : '';
            const effectClass = c.divergent ? 'divergent' : 'normal';
            html += `
              <button class="choice-btn ${divergentClass}" onclick="makeChoice(${i})">
                <span class="choice-text">${c.text}</span>
                <span class="choice-subtext">${c.subtext}</span>
                <span class="choice-effect ${effectClass}">${c.divergent ? '⚡ ' : ''}${c.effect === 'divergent' ? '改变历史' : c.effect}</span>
              </button>
            `;
          });
          html += `</div>`;
        } else if (!scene.nextChapter) {
          html += `<button class="continue-btn fade-in delay-4" onclick="nextScene()">继续 <span class="arrow">→</span></button>`;
        } else {
          html += `<button class="continue-btn fade-in delay-4" onclick="nextChapter()">继续 <span class="arrow">→</span></button>`;
        }
      }
      
      panel.innerHTML = html;
    }

    // ==================== 选择处理 ====================
    function makeChoice(index) {
      const scene = chapters[state.chapter].scenes[state.scene];
      const choice = scene.choices[index];
      
      state.choices.push({ chapter: state.chapter, scene: state.scene, choice: index });
      
      // 应用效果
      if (choice.result) {
        if (choice.result.destiny) state.stats.destiny = Math.max(0, Math.min(100, state.stats.destiny + choice.result.destiny));
        if (choice.result.military) state.stats.military = Math.max(0, Math.min(100, state.stats.military + choice.result.military));
        if (choice.result.wisdom) state.stats.wisdom = Math.max(0, Math.min(100, state.stats.wisdom + choice.result.wisdom));
        if (choice.result.divergence) state.divergence = Math.min(5, state.divergence + choice.result.divergence);
        if (choice.result.flag) state.flags[choice.result.flag] = true;
      }
      
      updateStats();
      
      // 标记按钮
      document.querySelectorAll('.choice-btn').forEach((btn, i) => {
        btn.classList.add(i === index ? 'selected' : 'faded');
      });
      
      setTimeout(() => nextScene(), 800);
    }

    function nextScene() {
      const chapter = chapters[state.chapter];
      if (state.scene < chapter.scenes.length - 1) {
        state.scene++;
        renderScene();
      } else {
        nextChapter();
      }
    }

    function nextChapter() {
      if (state.chapter < chapters.length - 1) {
        state.chapter++;
        state.scene = 0;
        showTransition();
      }
    }

    // ==================== 过渡动画 ====================
    function showTransition() {
      const chapter = chapters[state.chapter];
      const trans = document.getElementById('sceneTransition');
      
      document.getElementById('transitionYear').textContent = chapter.year;
      document.getElementById('transitionText').textContent = chapter.era;
      document.getElementById('transitionSubtext').textContent = chapter.title;
      
      const divNotice = document.getElementById('transitionDivergence');
      if (state.divergence >= 2) {
        divNotice.classList.add('active');
      } else {
        divNotice.classList.remove('active');
      }
      
      trans.classList.add('active');
      
      setTimeout(() => {
        trans.classList.remove('active');
        renderScene();
      }, 2500);
    }

    // ==================== UI 更新 ====================
    function updateStats() {
      document.getElementById('destinyValue').textContent = state.stats.destiny;
      document.getElementById('destinyBar').style.width = state.stats.destiny + '%';
      document.getElementById('militaryValue').textContent = state.stats.military;
      document.getElementById('militaryBar').style.width = state.stats.military + '%';
      document.getElementById('wisdomValue').textContent = state.stats.wisdom;
      document.getElementById('wisdomBar').style.width = state.stats.wisdom + '%';
      
      // 偏离度指示器
      const dots = document.querySelectorAll('.divergence-dot');
      dots.forEach((dot, i) => {
        dot.classList.remove('active', 'changed');
        if (i < state.divergence) {
          dot.classList.add('changed');
        }
      });
    }

    function updateProgressDots() {
      const container = document.getElementById('progressDots');
      container.innerHTML = '';
      
      chapters.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (i < state.chapter) dot.classList.add('completed');
        if (i === state.chapter) dot.classList.add('active');
        container.appendChild(dot);
      });
    }

    function restart() {
      state.chapter = 0;
      state.scene = 0;
      state.stats = { destiny: 30, military: 25, wisdom: 50 };
      state.divergence = 0;
      state.choices = [];
      state.flags = {};
      
      document.getElementById('endingScreen').classList.remove('active');
      renderScene();
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
      renderScene();
    });
  </script>
</body>
</html>
